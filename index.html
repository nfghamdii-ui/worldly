<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Qulex"/>
<meta name="theme-color" content="#8b3a9e"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Qulex — تعلم الإنجليزية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000000;--surf:#0f0f0f;--surf2:#1a1a1a;--acc:#8b3a9e;--acc2:#c47abf;--grn:#3ec87a;--red:#e05555;--txt:#ebebf5;--mut:#666680;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
.app{max-width:460px;margin:0 auto;min-height:100vh;}
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1a0828 0%,#000 60%);}
.auth-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(139,58,158,.4);}
.auth-icon svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.auth-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:44px;color:#fff;margin-bottom:6px;line-height:1;}
.auth-sub{font-size:12px;color:var(--mut);margin-bottom:36px;letter-spacing:1.5px;}
.auth-box{width:100%;max-width:380px;background:rgba(15,15,15,.9);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px);}
.auth-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s;}
.auth-tab.on{background:var(--acc);color:#fff;}
.auth-inp{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:13px 14px;outline:none;margin-bottom:10px;direction:ltr;text-align:left;}
.auth-inp::placeholder{color:var(--mut);direction:rtl;text-align:right;}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),#a044b8);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 16px rgba(139,58,158,.3);}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;}
.auth-ok{font-size:12px;color:var(--grn);text-align:center;margin-top:10px;min-height:18px;}
.header{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a;padding:calc(10px + var(--safe-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between;transition:transform .3s ease;}
.logo-en{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--acc);line-height:1;}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(240,160,48,.12);border-radius:20px;padding:5px 10px;font-size:12px;color:#f0a030;font-weight:700;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;cursor:pointer;}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);border-top:1px solid #1a1a1a;padding:10px 16px calc(10px + var(--safe-bot));display:flex;gap:4px;align-items:center;justify-content:center;}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-radius:30px;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab.on{background:var(--acc);color:#fff;padding:10px 16px;flex:0 0 auto;}
.tab.on .tab-label{display:inline;}
.tab:not(.on) .tab-label{display:none;}
.tab-icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.content{padding:calc(65px + var(--safe-top)) 16px calc(80px + var(--safe-bot));overflow-y:auto;height:100vh;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.page{display:none;}
.page.on{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes wordIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@keyframes saveAnim{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.word-anim{animation:wordIn .4s cubic-bezier(.34,1.1,.64,1);}
.save-anim{animation:saveAnim .3s ease;}
.card{background:var(--surf);border:none;border-radius:14px;padding:14px;margin-bottom:8px;}
.lbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;text-align:right;}
.hero{background:linear-gradient(160deg,#080808 0%,#1a0828 55%,#0f0a1a 100%);border:none;border-radius:22px;padding:24px 20px 20px;text-align:center;margin-bottom:8px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(139,58,158,.25) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:"";position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(196,122,191,.12) 0%,transparent 70%);pointer-events:none;}
.daily-bar-wrap{position:relative;z-index:1;margin-bottom:16px;}
.daily-label{font-size:11px;color:var(--mut);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.daily-label span:last-child{color:var(--acc2);font-weight:700;}
.daily-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.daily-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .5s ease;}
.word-big{font-family:'Playfair Display',serif;font-size:58px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-2px;position:relative;z-index:1;}
.word-ph{direction:ltr;color:var(--mut);font-size:13px;margin-bottom:10px;position:relative;z-index:1;}
.word-ar{font-size:26px;font-weight:800;color:var(--acc2);margin-bottom:14px;position:relative;z-index:1;}
.btns3{display:flex;gap:6px;position:relative;z-index:1;}
.abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:30px;padding:10px 4px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;}
.save-btn{margin-top:10px;position:relative;z-index:1;width:100%;padding:13px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.save-btn.unsaved{background:rgba(139,58,158,.15);color:var(--acc2);}
.save-btn.saved{background:var(--grn);color:#fff;}
.save-btn svg{width:18px;height:18px;transition:all .2s;}
.swipe-hint{font-size:11px;color:var(--mut);text-align:center;margin-top:10px;position:relative;z-index:1;opacity:.5;}
.cb-btn{width:100%;padding:11px;background:rgba(62,200,122,.08);color:#3ec87a;border:1px dashed rgba(62,200,122,.25);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.cb-frame{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a;}
.yt-btn{width:100%;padding:11px;background:rgba(255,50,50,.08);color:#ff5050;border:1px dashed rgba(255,50,50,.2);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.yt-frame{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a;}
.gen-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;margin-bottom:8px;background:var(--surf);border-radius:14px;}
.dot{width:8px;height:8px;background:var(--acc);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.ex-block{border-right:3px solid var(--acc2);padding-right:10px;margin-bottom:12px;}
.ex-block:last-child{margin-bottom:0;}
.ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ex-en{font-size:13px;font-style:italic;direction:ltr;text-align:left;flex:1;margin-bottom:3px;}
.ex-ar{font-size:12px;color:var(--mut);}
.spk-sm{background:none;border:1px solid #2a2a2a;border-radius:20px;padding:3px 8px;color:var(--mut);font-size:11px;cursor:pointer;flex-shrink:0;font-family:'Tajawal',sans-serif;}
.gram-head{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;direction:ltr;text-align:left;margin-bottom:8px;}
.gram-ok{background:rgba(62,200,122,.1);}
.gram-no{background:rgba(224,85,85,.1);}
.gram-note{background:var(--surf2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--mut);line-height:1.6;}
.tip-btn{width:100%;background:none;border:1px dashed #2a2a2a;border-radius:10px;color:var(--acc);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px;cursor:pointer;}
.tip-box{margin-top:8px;padding:10px;background:rgba(139,58,158,.08);border-radius:10px;font-size:13px;color:var(--acc2);line-height:1.65;}
.note-ta{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:80px;direction:rtl;}
.btn-p{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn-s{padding:13px;background:var(--surf2);color:var(--txt);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;}
.btn-d{padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.srch{width:100%;background:var(--surf);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:11px 14px;outline:none;margin-bottom:8px;}
.lcard{background:var(--surf);border:none;border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;position:relative;}
.fc-wrap{cursor:pointer;min-height:220px;margin-bottom:16px;}
.fc-inner{position:relative;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:220px;}
.fc-inner.flip{transform:rotateY(180deg);}
.fc-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:36px 24px;text-align:center;position:absolute;top:0;left:0;width:100%;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.fc-front{background:linear-gradient(135deg,#1a0a20,#0f0f0f);}
.fc-back{background:linear-gradient(135deg,#0a1a0f,#0a120a);transform:rotateY(180deg);}
.qopt{display:block;width:100%;margin-bottom:8px;padding:13px 14px;background:var(--surf);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--txt);cursor:pointer;text-align:right;}
.qopt.ok{background:rgba(62,200,122,.15);color:var(--grn);}
.qopt.no{background:rgba(224,85,85,.15);color:var(--red);}
.wq-inp{width:100%;background:var(--surf2);border:2px solid #2a2a2a;border-radius:12px;color:var(--txt);font-family:'Playfair Display',serif;font-size:28px;padding:16px;outline:none;text-align:center;direction:ltr;transition:border-color .2s;}
.wq-inp:focus{border-color:var(--acc);}
.wq-inp.ok{border-color:var(--grn);background:rgba(62,200,122,.08);}
.wq-inp.no{border-color:var(--red);background:rgba(224,85,85,.08);}
.quiz-mode-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.quiz-mode-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s;}
.quiz-mode-tab.on{background:var(--acc);color:#fff;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.scard{background:var(--surf);border:none;border-radius:14px;padding:14px;text-align:center;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bitem{background:var(--surf2);border:none;border-radius:12px;padding:10px 8px;text-align:center;opacity:.4;}
.bitem.got{background:rgba(139,58,158,.15);opacity:1;}
.prog{height:4px;background:var(--surf2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.pfill{height:100%;background:var(--acc);border-radius:99px;transition:width .4s;}
.fov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.fsheet{background:#0f0f0f;border-radius:20px 20px 0 0;padding:20px 16px calc(36px + var(--safe-bot));width:100%;max-width:460px;}
.pill{padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;margin:3px;}
.sring{width:110px;height:110px;border-radius:50%;border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;background:rgba(139,58,158,.08);}
.empty{text-align:center;padding:40px 0;}
.back{background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
body.light{--bg:#f5f5f5;--surf:#ffffff;--surf2:#eeeeee;--txt:#141428;--mut:#7a6a88;--acc:#8b3a9e;--acc2:#9b4aae;}
body.light .hero{background:linear-gradient(160deg,#f0e8ff 0%,#e0c8f8 55%,#ece0ff 100%);}
body.light .header{background:rgba(245,245,245,.9);border-bottom:1px solid #e0e0e0;}
body.light .tabs{background:rgba(245,245,245,.9);border-top:1px solid #e0e0e0;}
body.light .auth-screen{background:radial-gradient(ellipse at top,#e8d0f8 0%,#f5f5f5 60%);}
body.light .auth-box{background:rgba(255,255,255,.95);}
.gram-cat{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gram-cat-head{width:100%;padding:16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-left:12px;flex-shrink:0;}
.gram-cat-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-rule-card{background:var(--surf2);border-radius:12px;padding:14px;margin-bottom:8px;}
.gram-rule-card:last-child{margin-bottom:0;}
.gram-rule-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:6px;}
.gram-rule-desc{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:10px;}
.gram-rule-ex{padding:8px 12px;border-radius:8px;font-size:13px;direction:ltr;text-align:left;margin-bottom:6px;}
.gram-rule-ok{background:rgba(62,200,122,.1);color:var(--grn);}
.gram-rule-no{background:rgba(224,85,85,.1);color:var(--red);}
.gram-rule-tip{font-size:12px;color:var(--acc2);background:rgba(139,58,158,.08);padding:8px 12px;border-radius:8px;margin-top:6px;}
</style>
</head>
<body>
<div class="app">
<div id="authScreen" class="auth-screen" style="display:none;">
  <div class="auth-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
  <div class="auth-logo">Qulex</div>
  <div class="auth-sub">تعلم الإنجليزية · RQN</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="switchAuth('login')">دخول</button>
      <button class="auth-tab" onclick="switchAuth('register')">حساب جديد</button>
    </div>
    <input class="auth-inp" id="authEmail" type="email" placeholder="الإيميل" autocomplete="email"/>
    <input class="auth-inp" id="authPass" type="password" placeholder="كلمة المرور" autocomplete="current-password"/>
    <div id="authName" style="display:none;"><input class="auth-inp" id="authNameInp" type="text" placeholder="اسمك (اختياري)" autocomplete="name"/></div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">دخول</button>
    <div id="authMsg" class="auth-err"></div>
    <button onclick="skipAuth()" style="width:100%;background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;margin-top:16px;padding:8px;">تصفح بدون حساب</button>
  </div>
</div>
<div id="mainApp" style="display:none;">
<div class="header">
  <div><div class="logo-en">Qulex</div><div class="logo-sub">تعلم الإنجليزية · RQN</div></div>
  <div class="header-right">
    <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">1</span></div>
    <div class="user-avatar" id="userAvatar" onclick="go('stats')">؟</div>
  </div>
</div>
<div class="content" id="mainContent">
  <div class="page on" id="p-home"><div id="homeDiv"></div></div>
  <div class="page" id="p-library"><div id="libDiv"></div></div>
  <div class="page" id="p-flash"><div id="flashDiv"></div></div>
  <div class="page" id="p-quiz"><div id="quizDiv"></div></div>
  <div class="page" id="p-stats"><div id="statsDiv"></div></div>
  <div class="page" id="p-grammar"><div id="grammarDiv"></div></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="go('home')"><svg class="tab-icon" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span class="tab-label">اليوم</span></button>
  <button class="tab" onclick="go('library')"><svg class="tab-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span class="tab-label">مكتبتي</span></button>
  <button class="tab" onclick="go('flash')"><svg class="tab-icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span class="tab-label">مراجعة</span></button>
  <button class="tab" onclick="go('quiz')"><svg class="tab-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg><span class="tab-label">اختبار</span></button>
  <button class="tab" onclick="go('grammar')"><svg class="tab-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="tab-label">قواعد</span></button>
  <button class="tab" onclick="go('stats')"><svg class="tab-icon" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span class="tab-label">إحصائيات</span></button>
</div>
</div>

async function genWord(){if(gen)return;gen=true;tipOpen=false;gramOpen=false;noteEdit=false;drawHome();const used=st.words.slice(-20).map(w=>w.word).join(",");const lvl=st.fLevel==="الكل"?["مبتدئ","متوسط","متقدم"][Math.floor(Math.random()*3)]:st.fLevel;const cat=st.fCat==="الكل"?"عام":st.fCat;const prompt=`علّم العرب إنجليزي. اختر كلمة ${lvl==="مبتدئ"?"سهلة":lvl==="متقدم"?"متقدمة":"متوسطة"} عن "${cat}". لا تكرر: ${used||"لا"}.\nJSON فقط:\n{"word":"","phonetic":"","type":"اسم/فعل/صفة","arabic":"","level":"${lvl}","cat":"${cat}","definition":"جملة","examples":[{"en":"","ar":""},{"en":"","ar":""},{"en":"","ar":""}],"tip":"","grammar":{"rule":"","explanation":"جملتان","correct":"","wrong":"","tip":""}}`;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=(d.content||[]).find(b=>b.type==="text")?.text||"";const w=JSON.parse(t.replace(/```json|```/g,"").trim());st.words.push(w);st.curIdx=st.words.length-1;save();}catch(e){document.getElementById("homeDiv").innerHTML+=`<p style="color:var(--red);text-align:center;font-size:12px;margin-top:8px;">تعذّر التوليد</p>`;}gen=false;drawHome();updCnt();}
async function spk(txt,rate=1){
  const btn=event?.currentTarget;
  if(btn){btn.textContent="⏳";btn.disabled=true;}
  try{
    const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+EL_VOICE,{
      method:"POST",
      headers:{"Content-Type":"application/json","xi-api-key":EL_KEY},
      body:JSON.stringify({text:txt,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.5,similarity_boost:0.75}})
    });
    if(!r.ok)throw new Error("EL failed");
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.playbackRate=rate;
    audio.play();
    audio.onended=()=>URL.revokeObjectURL(url);
  }catch(e){
    if(window.speechSynthesis){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(txt);
      u.lang="en-US";u.rate=rate;
      const vs=window.speechSynthesis.getVoices();
      const v=vs.find(v=>v.lang.startsWith("en")&&v.localService)||vs.find(v=>v.lang.startsWith("en"));
      if(v)u.voice=v;
      window.speechSynthesis.speak(u);
    }
  }
  if(btn){btn.textContent="🔊 استمع";btn.disabled=false;}
}

async function spkWriting(word,btn){
  if(btn){btn.textContent="⏳";btn.disabled=true;}
  try{
    const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+EL_VOICE,{method:"POST",headers:{"Content-Type":"application/json","xi-api-key":EL_KEY},body:JSON.stringify({text:word,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.5,similarity_boost:0.75}})});
    if(!r.ok)throw new Error();
    const blob=await r.blob();const url=URL.createObjectURL(blob);const audio=new Audio(url);audio.play();audio.onended=()=>URL.revokeObjectURL(url);
  }catch(e){
    if(window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang="en-US";window.speechSynthesis.speak(u);}
  }
  if(btn){btn.textContent="🔊 استمع للنطق";btn.disabled=false;}
}

const GRAMMAR_CATS=[{icon:"⏰",color:"#3ec87a",name:"الأزمنة",nameEn:"Tenses",rules:[{title:"المضارع البسيط — Simple Present",desc:"يُستخدم للعادات والحقائق الثابتة. مع he/she/it نضيف s للفعل.",examples:[{text:"She works every day.",ar:"هي تعمل كل يوم.",ok:true},{text:"She work every day.",ar:"",ok:false}],tip:"💡 تذكر: He/She/It → فعل + s"},{title:"الماضي البسيط — Simple Past",desc:"يُستخدم لحدث اكتمل في الماضي. الأفعال المنتظمة تأخذ -ed.",examples:[{text:"They visited Paris last year.",ar:"زاروا باريس العام الماضي.",ok:true},{text:"They visit Paris last year.",ar:"",ok:false}],tip:"💡 الأفعال غير المنتظمة: go→went، eat→ate، see→saw"},{title:"المضارع التام — Present Perfect",desc:"يُستخدم لتجربة أو حدث له علاقة بالحاضر. have/has + تصريف ثالث.",examples:[{text:"I have visited Japan twice.",ar:"زرت اليابان مرتين.",ok:true},{text:"I visited Japan twice.",ar:"",ok:false}],tip:"💡 have/has + past participle (eaten, gone, seen)"},{title:"المستقبل — Future with Will",desc:"يُستخدم للقرارات اللحظية والتنبؤات. will + مصدر الفعل.",examples:[{text:"It will rain tomorrow.",ar:"ستمطر غداً.",ok:true},{text:"It will rains tomorrow.",ar:"",ok:false}],tip:"💡 will لا يتغير مع أي ضمير"}]},{icon:"🔗",color:"#f0a030",name:"حروف الجر",nameEn:"Prepositions",rules:[{title:"in / on / at — الزمان",desc:"in للأشهر والسنوات. on للأيام. at للوقت المحدد.",examples:[{text:"I was born in 1995, on Monday, at 3pm.",ar:"وُلدت عام ١٩٩٥، يوم الإثنين، الساعة ٣.",ok:true},{text:"I was born on 1995.",ar:"",ok:false}],tip:"💡 in السنة، on اليوم، at الساعة"},{title:"in / on / at — المكان",desc:"in للأماكن المغلقة. on للأسطح. at للنقاط المحددة.",examples:[{text:"She is in the room, sitting on the chair, at her desk.",ar:"هي في الغرفة، جالسة على الكرسي، عند مكتبها.",ok:true},{text:"She is at the room.",ar:"",ok:false}],tip:"💡 in داخل، on فوق السطح، at نقطة محددة"},{title:"for / since — المدة",desc:"for للمدة الزمنية. since لنقطة البداية.",examples:[{text:"I have lived here for 5 years / since 2019.",ar:"عشت هنا لمدة ٥ سنوات / منذ ٢٠١٩.",ok:true},{text:"I have lived here since 5 years.",ar:"",ok:false}],tip:"💡 for + مدة، since + تاريخ أو حدث"}]},{icon:"🔄",color:"#e05555",name:"المقارنة",nameEn:"Comparatives",rules:[{title:"المقارنة — Comparative",desc:"الصفات القصيرة + er. الصفات الطويلة: more + صفة.",examples:[{text:"She is taller than her sister.",ar:"هي أطول من أختها.",ok:true},{text:"She is more tall than her sister.",ar:"",ok:false}],tip:"💡 قصيرة: tall→taller. طويلة: interesting→more interesting"},{title:"التفضيل — Superlative",desc:"الصفات القصيرة + est. الصفات الطويلة: most + صفة.",examples:[{text:"He is the tallest in class.",ar:"هو الأطول في الفصل.",ok:true},{text:"He is the most tall in class.",ar:"",ok:false}],tip:"💡 دائماً مع the: the tallest, the most beautiful"}]},{icon:"❓",color:"#c47abf",name:"الأسئلة",nameEn:"Questions",rules:[{title:"أسئلة do/does/did",desc:"المضارع البسيط: Do/Does. الماضي: Did. بعدها الفعل بدون تصريف.",examples:[{text:"Does she work here? / Did you see him?",ar:"هل تعمل هنا؟ / هل رأيته؟",ok:true},{text:"Does she works here?",ar:"",ok:false}],tip:"💡 بعد Does/Did الفعل يرجع لأصله بدون s أو ed"},{title:"أسئلة Wh-",desc:"What/Where/When/Why/Who/How + فعل مساعد + فاعل + فعل.",examples:[{text:"Where do you live? / What did she say?",ar:"أين تسكن؟ / ماذا قالت؟",ok:true},{text:"Where you live?",ar:"",ok:false}],tip:"💡 لا تنسَ الفعل المساعد do/does/did بعد أداة الاستفهام"}]},{icon:"📝",color:"#8b3a9e",name:"الأفعال المساعدة",nameEn:"Modal Verbs",rules:[{title:"can / could — القدرة",desc:"can للحاضر. could للماضي أو الطلب المهذب. بعدهما الفعل بدون to.",examples:[{text:"She can swim. / Could you help me?",ar:"هي تستطيع السباحة.",ok:true},{text:"She can to swim.",ar:"",ok:false}],tip:"💡 can/could/will/should + فعل بدون to"},{title:"should / must — الوجوب",desc:"should للنصيحة. must للضرورة القوية.",examples:[{text:"You should sleep early. / You must wear a seatbelt.",ar:"يجب أن تنام مبكراً.",ok:true},{text:"You should to sleep early.",ar:"",ok:false}],tip:"💡 should نصيحة، must ضرورة"}]},{icon:"🔤",color:"#3ec87a",name:"الجمع والمفرد",nameEn:"Plural Rules",rules:[{title:"قواعد الجمع الأساسية",desc:"معظم الأسماء: + s. تنتهي بـ s/x/ch/sh: + es. تنتهي بـ y بعد ساكن: y→ies.",examples:[{text:"cat→cats, box→boxes, city→cities",ar:"قطة→قطط، صندوق→صناديق، مدينة→مدن",ok:true},{text:"citys / boxs",ar:"",ok:false}],tip:"💡 consonant + y = ies: baby→babies"},{title:"الجمع الشاذ — Irregular Plurals",desc:"بعض الكلمات لها جمع خاص لا يتبع القاعدة.",examples:[{text:"man→men, woman→women, child→children, tooth→teeth",ar:"رجل→رجال، امرأة→نساء، طفل→أطفال",ok:true},{text:"mans / womans / childs",ar:"",ok:false}],tip:"💡 احفظها كما هي: person→people, mouse→mice, foot→feet"}]}];
let gramCatOpen=-1;
function drawGrammar(){const d=document.getElementById("grammarDiv");let h=`<h2 style="font-size:18px;font-weight:800;margin-bottom:4px;">القواعد النحوية 📐</h2><p style="font-size:12px;color:var(--mut);margin-bottom:16px;">تعلم القواعد الأساسية بأمثلة واضحة</p>`;GRAMMAR_CATS.forEach((cat,ci)=>{const isOpen=gramCatOpen===ci;h+=`<div class="gram-cat"><button class="gram-cat-head" onclick="toggleGramCat(${ci})"><div style="display:flex;align-items:center;flex:1;"><div class="gram-cat-icon" style="background:${cat.color}18;">${cat.icon}</div><div style="text-align:right;"><div style="font-size:15px;font-weight:800;color:var(--txt);">${cat.name}</div><div style="font-size:11px;color:var(--mut);">${cat.nameEn} · ${cat.rules.length} قواعد</div></div></div><span style="color:var(--mut);font-size:12px;margin-right:8px;">${isOpen?"▲":"▼"}</span></button>${isOpen?`<div class="gram-cat-body">${cat.rules.map(rule=>`<div class="gram-rule-card"><div class="gram-rule-title">${rule.title}</div><div class="gram-rule-desc">${rule.desc}</div>${rule.examples.map(ex=>`<div class="gram-rule-ex ${ex.ok?"gram-rule-ok":"gram-rule-no"}">${ex.ok?"✅":"❌"} ${ex.text}${ex.ar?`<div style="font-size:11px;opacity:.7;direction:rtl;text-align:right;margin-top:2px;">${ex.ar}</div>`:""}</div>`).join("")}<div class="gram-rule-tip">${rule.tip}</div></div>`).join("")}</div>`:""}</div>`;});d.innerHTML=h;}
function toggleGramCat(idx){gramCatOpen=gramCatOpen===idx?-1:idx;drawGrammar();}
let ytVideos=[];let ytIdx=0;let ytWord="";
async function loadYTVideos(word){
  ytWord=word;ytIdx=0;ytVideos=[];
  const div=document.getElementById("ytIframeEl");
  div.innerHTML=`<div style="padding:20px;text-align:center;"><span style="font-size:13px;color:var(--mut)">⏳ جاري البحث...</span></div>`;
  try{
    // Search for short pronunciation videos (videoDuration=short = under 4 min)
    // Search for real videos where the word is naturally spoken (with captions)
    const q=encodeURIComponent('"'+word+'" english speaking');
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=5&videoCaption=closedCaption&relevanceLanguage=en&key=${YT_KEY}`);
    const d=await r.json();
    ytVideos=(d.items||[]).map(i=>i.id.videoId).filter(Boolean);
    if(ytVideos.length>0){showYTVideo();}
    else{div.innerHTML=`<p style="text-align:center;color:var(--mut);padding:20px;font-size:13px;">لم يتم العثور على مقطع</p>`;}
  }catch(e){
    div.innerHTML=`<p style="text-align:center;color:var(--red);padding:20px;font-size:13px;">تعذّر التحميل</p>`;
  }
}
function showYTVideo(){
  const div=document.getElementById("ytIframeEl");
  const vid=ytVideos[ytIdx];
  const hasNext=ytIdx<ytVideos.length-1;
  const hasPrev=ytIdx>0;
  div.innerHTML=`
    <iframe width="100%" height="200" src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&playsinline=1" frameborder="0" allow="autoplay;encrypted-media" style="display:block;border:none;border-radius:10px 10px 0 0;"></iframe>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surf2);border-radius:0 0 10px 10px;">
      <button onclick="prevYT()" ${hasPrev?"":"disabled"} style="background:none;border:none;color:${hasPrev?"var(--acc)":"var(--mut)"};font-size:18px;cursor:pointer;padding:4px 8px;">‹</button>
      <span style="font-size:11px;color:var(--mut)">${ytIdx+1} / ${ytVideos.length}</span>
      <button onclick="nextYT()" ${hasNext?"":"disabled"} style="background:none;border:none;color:${hasNext?"var(--acc)":"var(--mut)"};font-size:18px;cursor:pointer;padding:4px 8px;">›</button>
    </div>`;
}
function nextYT(){if(ytIdx<ytVideos.length-1){ytIdx++;showYTVideo();}}
function prevYT(){if(ytIdx>0){ytIdx--;showYTVideo();}}
async function toggleYT(word){
  const frame=document.getElementById("ytFrameEl");
  const btn=document.getElementById("ytBtnEl");
  if(!frame||!btn)return;
  if(frame.style.display==="none"||!frame.style.display){
    frame.style.display="block";
    const div=document.getElementById("ytIframeEl");
    if(!div.dataset.loaded||ytWord!==word){
      div.dataset.loaded="1";
      await loadYTVideos(word);
    }
    btn.textContent="✕ إغلاق المقطع";
    btn.style.background="rgba(255,50,50,.2)";
  }else{
    frame.style.display="none";
    btn.textContent="▶ شغّل مقطع يوتيوب";
    btn.style.background="";
  }
}
// جلب عدد الكلمات الكلي
let totalWordsCount=0;
async function fetchTotalCount(){
  try{
    const lvlF=st.fLevel!=="الكل"?`&level=eq.${encodeURIComponent(st.fLevel)}`:"";
    const catF=st.fCat!=="الكل"?`&cat=eq.${encodeURIComponent(st.fCat)}`:"";
    const r=await fetch(SB_URL+"/rest/v1/words?select=id"+lvlF+catF,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"count=exact","Range":"0-0"}});
    const cnt=r.headers.get("content-range");
    if(cnt){totalWordsCount=parseInt(cnt.split("/")[1])||0;}
  }catch(e){}
}
// مخزن مؤقت للكلمات العشوائية
let wordBuffer=[];
// جلب كلمة عشوائية من المخزن
async function fetchRandomWord(){
  try{
    const lvlF=st.fLevel!=="الكل"?`&level=eq.${encodeURIComponent(st.fLevel)}`:"";
    const catF=st.fCat!=="الكل"?`&cat=eq.${encodeURIComponent(st.fCat)}`:"";
    // إذا المخزن فاضي، اجلب 10 كلمات بـ offsets مختلفة
    if(wordBuffer.length===0){
      const countR=await fetch(SB_URL+"/rest/v1/words?select=id"+lvlF+catF,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"count=exact","Range":"0-0"}});
      const cnt=countR.headers.get("content-range");
      const total=cnt?parseInt(cnt.split("/")[1]):0;
      if(!total)return null;
      totalWordsCount=total;
      // جلب 10 كلمات بـ offsets عشوائية مختلفة
      const offsets=new Set();
      while(offsets.size<Math.min(10,total)){
        offsets.add(Math.floor(Math.random()*total));
      }
      const fetches=Array.from(offsets).map(offset=>
        fetch(SB_URL+"/rest/v1/words?select=*"+lvlF+catF+`&offset=${offset}&limit=1`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}})
        .then(r=>r.json()).then(d=>d[0]).catch(()=>null)
      );
      const results=await Promise.all(fetches);
      wordBuffer=results.filter(w=>w!=null);
      // خلط البuffer
      for(let i=wordBuffer.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [wordBuffer[i],wordBuffer[j]]=[wordBuffer[j],wordBuffer[i]];
      }
    }
    // إخراج كلمة من المخزن وتجنب الكلمة الحالية
    const currentWord=st.words[st.curIdx]?.word?.toLowerCase()||"";
    let word=null;
    for(let i=0;i<wordBuffer.length;i++){
      if(wordBuffer[i].word.toLowerCase()!==currentWord){
        word=wordBuffer.splice(i,1)[0];
        break;
      }
    }
    // لو كل الكلمات نفس الكلمة الحالية
    if(!word&&wordBuffer.length>0){
      word=wordBuffer.shift();
    }
    return word;
  }catch(e){}
  return null;
}
async function fetchWords(){
  // جلب أول كلمة عشوائية لعرضها
  const w=await fetchRandomWord();
  if(w){
    if(!st.words.find(x=>x.word===w.word))st.words.push(w);
    st.curIdx=st.words.length-1;
    save();drawHome();updCnt();
  }
}
function initApp(){load();if(!st.dark)document.body.classList.add("light");updCnt();window.speechSynthesis?.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();if(st.words&&st.words.length>0){if(st.curIdx<0||st.curIdx>=st.words.length)st.curIdx=0;drawHome();}else{document.getElementById("homeDiv").innerHTML=`<div style="text-align:center;padding:60px 20px;"><div class="gen-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:13px;color:var(--mut);margin-top:12px;">جاري تحميل الكلمات...</p></div>`;}fetchWords();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}}
load();
if(!st.dark)document.body.classList.add("light");
const savedToken=localStorage.getItem("qulex_token");
const savedUser=localStorage.getItem("qulex_user");
if(savedToken&&savedUser){try{authToken=savedToken;currentUser=JSON.parse(savedUser);fetch(SB_URL+"/auth/v1/user",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}}).then(r=>r.json()).then(async d=>{if(d.id){await loadUserSaves();showApp();}else{localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");document.getElementById("authScreen").style.display="flex";}}).catch(()=>showApp());}catch(e){document.getElementById("authScreen").style.display="flex";}}else{document.getElementById("authScreen").style.display="flex";}
</script>
