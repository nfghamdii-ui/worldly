<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Qulex"/>
<meta name="theme-color" content="#8b3a9e"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Qulex — تعلم الإنجليزية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000000;--surf:#0f0f0f;--surf2:#1a1a1a;
  --acc:#8b3a9e;--acc2:#c47abf;--grn:#3ec87a;--red:#e05555;
  --txt:#ebebf5;--mut:#666680;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
.app{max-width:460px;margin:0 auto;min-height:100vh;}

/* ── Auth ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at top,#1a0828 0%,#000 60%);}
.auth-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:22px;
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(139,58,158,.4);}
.auth-icon svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.auth-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:44px;color:#fff;margin-bottom:6px;line-height:1;}
.auth-sub{font-size:12px;color:var(--mut);margin-bottom:36px;letter-spacing:1.5px;}
.auth-box{width:100%;max-width:380px;background:rgba(15,15,15,.9);border-radius:24px;padding:28px 24px;
  backdrop-filter:blur(20px);}
.auth-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s;}
.auth-tab.on{background:var(--acc);color:#fff;}
.auth-inp{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:13px 14px;outline:none;margin-bottom:10px;direction:ltr;text-align:left;}
.auth-inp::placeholder{color:var(--mut);direction:rtl;text-align:right;}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),#a044b8);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 16px rgba(139,58,158,.3);}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;}
.auth-ok{font-size:12px;color:var(--grn);text-align:center;margin-top:10px;min-height:18px;}

/* ── Header ── */
.header{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;
  background:rgba(0,0,0,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid #1a1a1a;
  padding:calc(10px + var(--safe-top)) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  transition:transform .3s ease;}
.logo-en{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--acc);line-height:1;}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(240,160,48,.12);border-radius:20px;padding:5px 10px;font-size:12px;color:#f0a030;font-weight:700;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;cursor:pointer;}

/* ── Tabs ── */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;
  background:rgba(0,0,0,.9);backdrop-filter:blur(12px);border-top:1px solid #1a1a1a;
  padding:10px 16px calc(10px + var(--safe-bot));display:flex;gap:4px;align-items:center;justify-content:center;}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-radius:30px;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab.on{background:var(--acc);color:#fff;padding:10px 16px;flex:0 0 auto;}
.tab.on .tab-label{display:inline;}
.tab:not(.on) .tab-label{display:none;}
.tab-icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

.content{padding:calc(65px + var(--safe-top)) 16px calc(80px + var(--safe-bot));overflow-y:auto;height:100vh;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}

.page{display:none;}
.page.on{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes wordIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@keyframes saveAnim{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.word-anim{animation:wordIn .4s cubic-bezier(.34,1.1,.64,1);}
.save-anim{animation:saveAnim .3s ease;}

.card{background:var(--surf);border:none;border-radius:14px;padding:14px;margin-bottom:8px;}
.lbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;text-align:right;}

/* ── Hero ── */
.hero{background:linear-gradient(160deg,#080808 0%,#1a0828 55%,#0f0a1a 100%);border:none;
  border-radius:22px;padding:24px 20px 20px;text-align:center;margin-bottom:8px;
  position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:240px;height:240px;
  background:radial-gradient(circle,rgba(139,58,158,.25) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:"";position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(196,122,191,.12) 0%,transparent 70%);pointer-events:none;}

/* Daily progress bar */
.daily-bar-wrap{position:relative;z-index:1;margin-bottom:16px;}
.daily-label{font-size:11px;color:var(--mut);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.daily-label span:last-child{color:var(--acc2);font-weight:700;}
.daily-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.daily-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .5s ease;}

.word-big{font-family:'Playfair Display',serif;font-size:58px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-2px;position:relative;z-index:1;}
.word-ph{direction:ltr;color:var(--mut);font-size:13px;margin-bottom:10px;position:relative;z-index:1;}
.word-ar{font-size:26px;font-weight:800;color:var(--acc2);margin-bottom:14px;position:relative;z-index:1;}
.btns3{display:flex;gap:6px;position:relative;z-index:1;}
.abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  border-radius:30px;padding:10px 4px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;}

/* Save button with star */
.save-btn{margin-top:10px;position:relative;z-index:1;width:100%;padding:13px;border:none;border-radius:14px;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.save-btn.unsaved{background:rgba(139,58,158,.15);color:var(--acc2);}
.save-btn.saved{background:var(--grn);color:#fff;}
.save-btn svg{width:18px;height:18px;transition:all .2s;}

.swipe-hint{font-size:11px;color:var(--mut);text-align:center;margin-top:10px;position:relative;z-index:1;opacity:.5;}

.gen-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;margin-bottom:8px;background:var(--surf);border-radius:14px;}
.dot{width:8px;height:8px;background:var(--acc);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

.ex-block{border-right:3px solid var(--acc2);padding-right:10px;margin-bottom:12px;}
.ex-block:last-child{margin-bottom:0;}
.ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ex-en{font-size:13px;font-style:italic;direction:ltr;text-align:left;flex:1;margin-bottom:3px;}
.ex-ar{font-size:12px;color:var(--mut);}
.spk-sm{background:none;border:1px solid #2a2a2a;border-radius:20px;padding:3px 8px;color:var(--mut);font-size:11px;cursor:pointer;flex-shrink:0;font-family:'Tajawal',sans-serif;}

.gram-head{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;direction:ltr;text-align:left;margin-bottom:8px;}
.gram-ok{background:rgba(62,200,122,.1);}
.gram-no{background:rgba(224,85,85,.1);}
.gram-note{background:var(--surf2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--mut);line-height:1.6;}

.tip-btn{width:100%;background:none;border:1px dashed #2a2a2a;border-radius:10px;color:var(--acc);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px;cursor:pointer;}
.tip-box{margin-top:8px;padding:10px;background:rgba(139,58,158,.08);border-radius:10px;font-size:13px;color:var(--acc2);line-height:1.65;}

.note-ta{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:80px;direction:rtl;}

.btn-p{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn-s{padding:13px;background:var(--surf2);color:var(--txt);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;}
.btn-d{padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}

.srch{width:100%;background:var(--surf);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:11px 14px;outline:none;margin-bottom:8px;}
.lcard{background:var(--surf);border:none;border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;position:relative;}

.fc-wrap{cursor:pointer;min-height:220px;margin-bottom:16px;}
.fc-inner{position:relative;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:220px;}
.fc-inner.flip{transform:rotateY(180deg);}
.fc-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:36px 24px;text-align:center;position:absolute;top:0;left:0;width:100%;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.fc-front{background:linear-gradient(135deg,#1a0a20,#0f0f0f);}
.fc-back{background:linear-gradient(135deg,#0a1a0f,#0a120a);transform:rotateY(180deg);}

.qopt{display:block;width:100%;margin-bottom:8px;padding:13px 14px;background:var(--surf);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--txt);cursor:pointer;text-align:right;}
.qopt.ok{background:rgba(62,200,122,.15);color:var(--grn);}
.qopt.no{background:rgba(224,85,85,.15);color:var(--red);}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.scard{background:var(--surf);border:none;border-radius:14px;padding:14px;text-align:center;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bitem{background:var(--surf2);border:none;border-radius:12px;padding:10px 8px;text-align:center;opacity:.4;}
.bitem.got{background:rgba(139,58,158,.15);opacity:1;}

.prog{height:4px;background:var(--surf2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.pfill{height:100%;background:var(--acc);border-radius:99px;transition:width .4s;}

.fov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.fsheet{background:#0f0f0f;border-radius:20px 20px 0 0;padding:20px 16px calc(36px + var(--safe-bot));width:100%;max-width:460px;}
.pill{padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;margin:3px;}

.sring{width:110px;height:110px;border-radius:50%;border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;background:rgba(139,58,158,.08);}
.empty{text-align:center;padding:40px 0;}
.back{background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

body.light{--bg:#f5f5f5;--surf:#ffffff;--surf2:#eeeeee;--txt:#141428;--mut:#7a6a88;--acc:#8b3a9e;--acc2:#9b4aae;}
body.light .hero{background:linear-gradient(160deg,#f0e8ff 0%,#e0c8f8 55%,#ece0ff 100%);}
body.light .header{background:rgba(245,245,245,.9);border-bottom:1px solid #e0e0e0;}
body.light .tabs{background:rgba(245,245,245,.9);border-top:1px solid #e0e0e0;}
body.light .auth-screen{background:radial-gradient(ellipse at top,#e8d0f8 0%,#f5f5f5 60%);}
body.light .auth-box{background:rgba(255,255,255,.95);}

/* ── Grammar Page ── */
.gram-cat{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gram-cat-head{width:100%;padding:16px;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-left:12px;flex-shrink:0;}
.gram-cat-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-rule-card{background:var(--surf2);border-radius:12px;padding:14px;margin-bottom:8px;}
.gram-rule-card:last-child{margin-bottom:0;}
.gram-rule-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:6px;}
.gram-rule-desc{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:10px;}
.gram-rule-ex{padding:8px 12px;border-radius:8px;font-size:13px;direction:ltr;text-align:left;margin-bottom:6px;}
.gram-rule-ok{background:rgba(62,200,122,.1);color:var(--grn);}
.gram-rule-no{background:rgba(224,85,85,.1);color:var(--red);}
.gram-rule-tip{font-size:12px;color:var(--acc2);background:rgba(139,58,158,.08);padding:8px 12px;border-radius:8px;margin-top:6px;}
</style>
</head>
<body>
<div class="app">

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen" style="display:none;">
  <div class="auth-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <div class="auth-logo">Qulex</div>
  <div class="auth-sub">تعلم الإنجليزية · RQN</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="switchAuth('login')">دخول</button>
      <button class="auth-tab" onclick="switchAuth('register')">حساب جديد</button>
    </div>
    <input class="auth-inp" id="authEmail" type="email" placeholder="الإيميل" autocomplete="email"/>
    <input class="auth-inp" id="authPass" type="password" placeholder="كلمة المرور" autocomplete="current-password"/>
    <div id="authName" style="display:none;">
      <input class="auth-inp" id="authNameInp" type="text" placeholder="اسمك (اختياري)" autocomplete="name"/>
    </div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">دخول</button>
    <div id="authMsg" class="auth-err"></div>
    <button onclick="skipAuth()" style="width:100%;background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;margin-top:16px;padding:8px;">تصفح بدون حساب</button>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">

<div class="header">
  <div>
    <div class="logo-en">Qulex</div>
    <div class="logo-sub">تعلم الإنجليزية · RQN</div>
  </div>
  <div class="header-right">
    <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">1</span></div>
    <div class="user-avatar" id="userAvatar" onclick="go('stats')">؟</div>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="page on" id="p-home"><div id="homeDiv"></div></div>
  <div class="page" id="p-library"><div id="libDiv"></div></div>
  <div class="page" id="p-flash"><div id="flashDiv"></div></div>
  <div class="page" id="p-quiz"><div id="quizDiv"></div></div>
  <div class="page" id="p-stats"><div id="statsDiv"></div></div>
  <div class="page" id="p-grammar"><div id="grammarDiv"></div></div>

</div>

<div class="tabs">
  <button class="tab on" onclick="go('home')">
    <svg class="tab-icon" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="tab-label">اليوم</span>
  </button>
  <button class="tab" onclick="go('library')">
    <svg class="tab-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    <span class="tab-label">مكتبتي</span>
  </button>
  <button class="tab" onclick="go('flash')">
    <svg class="tab-icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    <span class="tab-label">مراجعة</span>
  </button>
  <button class="tab" onclick="go('quiz')">
    <svg class="tab-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
    <span class="tab-label">اختبار</span>
  </button>
  <button class="tab" onclick="go('grammar')">
    <svg class="tab-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span class="tab-label">قواعد</span>
  </button>
  <button class="tab" onclick="go('stats')">
    <svg class="tab-icon" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    <span class="tab-label">إحصائيات</span>
  </button>
</div>

</div>

<div class="fov" id="fov" style="display:none" onclick="closeFilt()">
  <div class="fsheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-size:16px;font-weight:800;">🎯 فلترة الكلمات</span>
      <button onclick="closeFilt()" style="background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--mut);margin-bottom:8px;">المستوى</div>
    <div id="lvlPills" style="margin-bottom:16px;"></div>
    <div style="font-size:12px;font-weight:700;color:var(--mut);margin-bottom:8px;">التصنيف</div>
    <div id="catPills" style="margin-bottom:20px;"></div>

function switchAuth(mode){

async function doAuth(){

  if(!email||!pass){msg.className="auth-err";msg.textContent="أدخل الإيميل وكلمة المرور";return;}
  const btn=document.getElementById("authBtn");
  btn.textContent="⏳ جاري...";btn.disabled=true;
  try{
    const ep=authMode==="login"?"/auth/v1/token?grant_type=password":"/auth/v1/signup";

    if(d.error){msg.className="auth-err";msg.textContent=d.error_description||d.error;}
    else if(authMode==="register"&&!d.access_token){msg.className="auth-ok";msg.textContent="✅ تم الإنشاء! تحقق من إيميلك ثم سجّل دخول";switchAuth("login");}

}

async function loadUserSaves(){
  if(!authToken)return;

  }catch(e){}
}

}

}

function showApp(){

}

// ── Storage ───────────────────────────────────────────────────────────────
function load(){
  try{
    const s=JSON.parse(localStorage.getItem("qulex_pwa")||"{}");
    st={...st,...s};
    const today=new Date().toDateString();
    const yest=new Date(Date.now()-86400000).toDateString();
    if(st.lastVisit===today){}
    else if(st.lastVisit===yest)st.streak=(st.streak||0)+1;
    else st.streak=1;
    st.lastVisit=today;
    // Reset daily count if new day
    if(st.dailyDate!==today){st.dailyCount=0;st.dailyDate=today;}
  }catch(e){}
}
function save(){localStorage.setItem("qulex_pwa",JSON.stringify(st));}

function updHeader(){
  const el=document.getElementById("streakNum");

  }
}

// ── Words ─────────────────────────────────────────────────────────────────
function nextWord(){
  tipOpen=false;gramOpen=false;noteEdit=false;
  // Count daily words viewed
  const today=new Date().toDateString();
  if(st.dailyDate===today)st.dailyCount=Math.min(st.dailyCount+1,DAILY_GOAL);
  save();
  const filtered=st.words.filter(w=>(st.fLevel==="الكل"||w.level===st.fLevel)&&(st.fCat==="الكل"||w.cat===st.fCat));
  const nextIdx=filtered.findIndex(w=>w.word===st.words[st.curIdx]?.word);
  if(filtered.length>1){const next=(nextIdx+1)%filtered.length;st.curIdx=st.words.indexOf(filtered[next]);save();drawHome();}
  else genWord();
}
function prevWord(){
  tipOpen=false;gramOpen=false;noteEdit=false;
  if(st.curIdx>0){st.curIdx--;save();drawHome();}
}

async function genWord(){
  if(gen)return;

  const used=st.words.slice(-20).map(w=>w.word).join(",");
  const lvl=st.fLevel==="الكل"?["مبتدئ","متوسط","متقدم"][Math.floor(Math.random()*3)]:st.fLevel;
  const cat=st.fCat==="الكل"?"عام":st.fCat;
  const prompt=`علّم العرب إنجليزي. اختر كلمة ${lvl==="مبتدئ"?"سهلة":lvl==="متقدم"?"متقدمة":"متوسطة"} عن "${cat}". لا تكرر: ${used||"لا"}.
JSON فقط:
{"word":"","phonetic":"","type":"اسم/فعل/صفة","arabic":"","level":"${lvl}","cat":"${cat}","definition":"جملة","examples":[{"en":"","ar":""},{"en":"","ar":""},{"en":"","ar":""}],"tip":"","grammar":{"rule":"","explanation":"جملتان","correct":"","wrong":"","tip":""}}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const t=(d.content||[]).find(b=>b.type==="text")?.text||"";
    const w=JSON.parse(t.replace(/```json|```/g,"").trim());
    st.words.push(w);st.curIdx=st.words.length-1;save();
  }catch(e){document.getElementById("homeDiv").innerHTML+=`<p style="color:var(--red);text-align:center;font-size:12px;margin-top:8px;">تعذّر التوليد</p>`;}
  gen=false;drawHome();updCnt();
}

function spk(txt,rate=1){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);u.lang="en-US";u.rate=rate;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith("en")&&v.localService)||vs.find(v=>v.lang.startsWith("en"));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function drawQuiz(){
  const d=document.getElementById("quizDiv");
  if(st.saved.length<3){d.innerHTML=`<div class="empty"><div style="font-size:44px">📚</div><p style="font-weight:700;margin-top:8px">تحتاج 3 كلمات على الأقل</p></div>`;return;}
  if(!qqs.length){d.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 0;gap:12px"><span style="font-size:56px">🧠</span><h2 style="font-size:20px;font-weight:800">اختبر معلوماتك</h2><p style="font-size:13px;color:var(--mut)">سيتم اختبارك على ${st.saved.length} كلمة</p><button onclick="startQuiz()" style="padding:13px 40px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer">ابدأ الاختبار</button></div>`;return;}
  if(qdone){const pct=Math.round((qsc/qqs.length)*100);d.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 0;gap:12px"><div class="sring"><span style="font-size:28px;font-weight:800;color:var(--acc)">${pct}%</span></div><h2 style="font-size:20px;font-weight:800">${pct>=80?"ممتاز! 🎉":pct>=50?"جيد 👍":"استمر 💪"}</h2><p style="font-size:13px;color:var(--mut)">${qsc} من ${qqs.length} إجابة صحيحة</p><div style="display:flex;gap:10px"><button onclick="startQuiz()" style="padding:13px 28px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer">أعد الاختبار</button><button onclick="resetQuiz()" class="btn-s" style="padding:13px 24px">رجوع</button></div></div>`;return;}
  const q=qqs[qcur];
  let h=`<div class="prog"><div class="pfill" style="width:${(qcur/qqs.length)*100}%"></div></div><p style="font-size:11px;color:var(--mut);text-align:center;margin-bottom:12px">${qcur+1} من ${qqs.length}</p><div class="card" style="font-size:16px;font-weight:600;line-height:1.65;text-align:center;margin-bottom:12px">${q.question}</div>`;
  q.options.forEach((opt,i)=>{let cls="qopt";if(qsel!==null){if(i===q.correct)cls+=" ok";else if(i===qsel)cls+=" no";}h+=`<button class="${cls}" ${qsel!==null?"disabled":""} onclick="ansQ(${i})">${opt}</button>`;});
  d.innerHTML=h;
}
function startQuiz(){st.quizzes++;save();const sel=shuffle(st.saved).slice(0,8);qqs=sel.map(word=>{const eToA=Math.random()>.5;const pool=st.words.filter(w=>w.word!==word.word);const wr=shuffle(pool).slice(0,3);const ci=Math.floor(Math.random()*4);const opts=[];let wi=0;for(let i=0;i<4;i++){if(i===ci)opts.push(eToA?word.arabic:word.word);else opts.push(eToA?wr[wi]?.arabic||"—":wr[wi]?.word||"—");wi++;}return{question:eToA?`ما معنى "${word.word}" بالعربي؟`:`ما الكلمة الإنجليزية لـ "${word.arabic}"؟`,options:opts,correct:ci};});qcur=0;qsc=0;qsel=null;qdone=false;drawQuiz();}
function ansQ(idx){if(qsel!==null)return;qsel=idx;document.querySelectorAll(".qopt").forEach((b,i)=>{b.disabled=true;if(i===qqs[qcur].correct)b.classList.add("ok");else if(i===idx)b.classList.add("no");});if(idx===qqs[qcur].correct)qsc++;setTimeout(()=>{qcur++;qsel=null;if(qcur>=qqs.length){const pct=Math.round((qsc/qqs.length)*100);if(pct>st.best){st.best=pct;save();}qdone=true;}drawQuiz();},900);}
function resetQuiz(){qqs=[];qcur=0;qsc=0;qsel=null;qdone=false;drawQuiz();}

function go(tab){
  curtab=tab;tipOpen=false;gramOpen=false;noteEdit=false;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));

  const tabs=["home","library","flash","quiz","stats","grammar"];
  document.querySelectorAll(".tab")[tabs.indexOf(tab)]?.classList.add("on");

function toggleSave(word){
  const w=st.words.find(x=>x.word===word);if(!w)return;
  const i=st.saved.findIndex(s=>s.word===word);
  const removing=i>=0;
  if(removing)st.saved.splice(i,1);else st.saved.push(w);
  save();updCnt();
  // Animate save button
  const btn=document.getElementById("saveBtnEl");
  if(btn){btn.classList.add("save-anim");setTimeout(()=>btn.classList.remove("save-anim"),300);}
  syncSaveToCloud(word,removing);
  if(curtab==="home")drawHome();
}
function delWord(word){st.saved=st.saved.filter(s=>s.word!==word);save();updCnt();syncSaveToCloud(word,true);libSel=null;drawLib();}
function updCnt(){
  document.getElementById("savedCnt")?document.getElementById("savedCnt").textContent="📚 "+st.saved.length:null;
  updHeader();
}

      </div>`:""}
    </div>`;
  });

  d.innerHTML=h;
}

function toggleGramCat(idx){
  gramCatOpen=gramCatOpen===idx?-1:idx;
  drawGrammar();
}

async function fetchWords(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/words?select=*&limit=500",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    const data=await r.json();
    if(data&&data.length>0){
      data.forEach(w=>{if(!st.words.find(x=>x.word===w.word))st.words.push(w);});
      if(st.curIdx<0||st.curIdx>=st.words.length)st.curIdx=0;
      save();drawHome();updCnt();
    }
  }catch(e){}
}

function initApp(){
  load();
  if(!st.dark)document.body.classList.add("light");
  updCnt();
  window.speechSynthesis?.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  if(st.words&&st.words.length>0){if(st.curIdx<0||st.curIdx>=st.words.length)st.curIdx=0;drawHome();}
  else{document.getElementById("homeDiv").innerHTML=`<div style="text-align:center;padding:60px 20px;"><div class="gen-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:13px;color:var(--mut);margin-top:12px;">جاري تحميل الكلمات...</p></div>`;}
  fetchWords();
  if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}
}

load();
if(!st.dark)document.body.classList.add("light");

const savedToken=localStorage.getItem("qulex_token");
const savedUser=localStorage.getItem("qulex_user");
if(savedToken&&savedUser){
  try{
    authToken=savedToken;currentUser=JSON.parse(savedUser);
    fetch(SB_URL+"/auth/v1/user",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}})
      .then(r=>r.json())
      .then(async d=>{
        if(d.id){await loadUserSaves();showApp();}
        else{localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");document.getElementById("authScreen").style.display="flex";}
      }).catch(()=>showApp());
  }catch(e){document.getElementById("authScreen").style.display="flex";}
} else {
  document.getElementById("authScreen").style.display="flex";
}
</script>
</body>
</html>
