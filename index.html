<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MARS"/>
<meta name="theme-color" content="#8b3a9e"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>MARS — تعلم الإنجليزية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000000;--surf:#0f0f0f;--surf2:#1a1a1a;--acc:#8b3a9e;--acc2:#c47abf;--grn:#3ec87a;--red:#e05555;--txt:#ebebf5;--mut:#666680;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
.app{max-width:460px;margin:0 auto;min-height:100vh;}
.auth-screen{min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#000;}
.auth-bg{position:absolute;inset:0;background:linear-gradient(to bottom,#0a0018 0%,#080015 30%,#030008 60%,#000000 75%,#000000 100%);z-index:0;}
.auth-bg::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(100,30,140,.25) 0%,transparent 55%),radial-gradient(ellipse at 80% 50%,rgba(20,50,180,.18) 0%,transparent 50%),radial-gradient(ellipse at 50% 85%,rgba(15,30,100,.12) 0%,transparent 40%);z-index:1;}
.auth-particles{position:absolute;inset:0;z-index:1;overflow:hidden;}
.auth-particles span{position:absolute;bottom:-10px;width:3px;height:3px;background:#c47abf;border-radius:50%;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(0) scale(0);opacity:0;}15%{opacity:.9;}100%{transform:translateY(-100vh) scale(1.5);opacity:0;}}
.auth-top{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 28px 32px;}
.auth-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(139,58,158,.2);border:1px solid rgba(196,122,191,.3);border-radius:20px;padding:5px 12px;margin-bottom:20px;backdrop-filter:blur(10px);}
.auth-badge-dot{width:6px;height:6px;background:var(--acc2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.auth-badge span{font-size:11px;color:var(--acc2);font-weight:600;letter-spacing:.5px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:72px;font-weight:700;color:#fff;line-height:1;letter-spacing:-3px;direction:ltr;position:absolute;top:15%;left:28px;z-index:3;}
.auth-logo span{color:var(--acc2);}
.auth-tagline{font-size:clamp(13px,4vw,20px);font-weight:400;color:rgba(255,255,255,.7);line-height:1.4;margin-bottom:0;text-align:left;white-space:nowrap;}
.auth-tagline strong{color:#fff;font-weight:700;}
.auth-bottom{position:relative;z-index:2;padding:0 20px calc(32px + var(--safe-bot));background:linear-gradient(to top,#000 60%,transparent);}
.auth-box{width:100%;background:none;border:none;padding:0;margin-bottom:12px;}
.auth-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;margin-bottom:16px;gap:3px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;}
.auth-tab.on{background:var(--acc);color:#fff;}
.auth-inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;padding:12px 14px;outline:none;margin-bottom:8px;direction:ltr;text-align:left;transition:border-color .2s;}
.auth-inp:focus{border-color:var(--acc2);}
.auth-inp::placeholder{color:rgba(255,255,255,.3);direction:rtl;text-align:right;}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),#c044d8);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 24px rgba(139,58,158,.5);letter-spacing:.5px;}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
.auth-ok{font-size:12px;color:var(--grn);text-align:center;margin-top:8px;min-height:16px;}
.auth-skip{width:100%;background:none;border:none;color:rgba(255,255,255,.35);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;padding:10px;text-align:center;}
.social-btn{width:100%;padding:15px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:background .2s;}
.social-btn:active{background:rgba(255,255,255,.12);}
.social-btn-email{background:var(--acc);border-color:var(--acc);font-size:15px;font-weight:700;box-shadow:0 4px 20px rgba(139,58,158,.5);}
.social-btn-email:active{background:#7a2d8e;}
.auth-divider{display:none;}
.header{display:none!important;}
.logo-en{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--acc);line-height:1;}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(240,160,48,.12);border-radius:20px;padding:5px 10px;font-size:12px;color:#f0a030;font-weight:700;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;cursor:pointer;}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);border-top:1px solid #1a1a1a;padding:10px 16px calc(10px + var(--safe-bot));display:flex;gap:4px;align-items:center;justify-content:center;}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-radius:30px;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab.on{background:var(--acc);color:#fff;padding:10px 16px;flex:0 0 auto;}
.tab.on .tab-label{display:inline;}
.tab:not(.on) .tab-label{display:none;}
.tab-icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.content{padding:calc(16px + var(--safe-top)) 16px calc(80px + var(--safe-bot));overflow-y:auto;height:100vh;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.page{display:none;}
.page.on{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes wordIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@keyframes saveAnim{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.word-anim{animation:wordIn .4s cubic-bezier(.34,1.1,.64,1);}
.save-anim{animation:saveAnim .3s ease;}
.card{background:var(--surf);border:none;border-radius:14px;padding:14px;margin-bottom:8px;}
.lbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;text-align:right;}
.hero{background:linear-gradient(160deg,#080808 0%,#1a0828 55%,#0f0a1a 100%);border:none;border-radius:22px;padding:24px 20px 20px;text-align:center;margin-bottom:8px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(139,58,158,.25) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:"";position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(196,122,191,.12) 0%,transparent 70%);pointer-events:none;}
.daily-bar-wrap{position:relative;z-index:1;margin-bottom:16px;}
.daily-label{font-size:11px;color:var(--mut);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.daily-label span:last-child{color:var(--acc2);font-weight:700;}
.daily-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.daily-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .5s ease;}
.word-big{font-family:'Playfair Display',serif;font-size:58px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-2px;position:relative;z-index:1;}
.word-ph{direction:ltr;color:var(--mut);font-size:13px;margin-bottom:10px;position:relative;z-index:1;}
.word-ar{font-size:26px;font-weight:800;color:var(--acc2);margin-bottom:14px;position:relative;z-index:1;}
.btns3{display:flex;gap:6px;position:relative;z-index:1;}
.abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:30px;padding:10px 4px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;}
.save-btn{margin-top:10px;position:relative;z-index:1;width:100%;padding:13px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.save-btn.unsaved{background:rgba(139,58,158,.15);color:var(--acc2);}
.save-btn.saved{background:var(--grn);color:#fff;}
.save-btn svg{width:18px;height:18px;transition:all .2s;}
.swipe-hint{font-size:11px;color:var(--mut);text-align:center;margin-top:10px;position:relative;z-index:1;opacity:.5;}
.yt-btn{width:100%;padding:11px;background:rgba(255,50,50,.08);color:#ff5050;border:1px dashed rgba(255,50,50,.2);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.yt-frame{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a;}
.gen-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;margin-bottom:8px;background:var(--surf);border-radius:14px;}
.dot{width:8px;height:8px;background:var(--acc);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.ex-block{border-right:3px solid var(--acc2);padding-right:10px;margin-bottom:12px;}
.ex-block:last-child{margin-bottom:0;}
.ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ex-en{font-size:13px;font-style:italic;direction:ltr;text-align:left;flex:1;margin-bottom:3px;}
.ex-ar{font-size:12px;color:var(--mut);}
.spk-sm{background:none;border:1px solid #2a2a2a;border-radius:20px;padding:3px 8px;color:var(--mut);font-size:11px;cursor:pointer;flex-shrink:0;font-family:'Tajawal',sans-serif;}
.gram-head{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;direction:ltr;text-align:left;margin-bottom:8px;}
.gram-ok{background:rgba(62,200,122,.1);}
.gram-no{background:rgba(224,85,85,.1);}
.gram-note{background:var(--surf2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--mut);line-height:1.6;}
.tip-btn{width:100%;background:none;border:1px dashed #2a2a2a;border-radius:10px;color:var(--acc);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px;cursor:pointer;}
.tip-box{margin-top:8px;padding:10px;background:rgba(139,58,158,.08);border-radius:10px;font-size:13px;color:var(--acc2);line-height:1.65;}
.note-ta{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:80px;direction:rtl;}
.btn-p{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn-s{padding:13px;background:var(--surf2);color:var(--txt);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;}
.btn-d{padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.srch{width:100%;background:var(--surf);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:11px 14px;outline:none;margin-bottom:8px;}
.lcard{background:var(--surf);border:none;border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;position:relative;}
.fc-wrap{cursor:pointer;min-height:220px;margin-bottom:16px;}
.fc-inner{position:relative;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:220px;}
.fc-inner.flip{transform:rotateY(180deg);}
.fc-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:36px 24px;text-align:center;position:absolute;top:0;left:0;width:100%;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.fc-front{background:linear-gradient(135deg,#1a0a20,#0f0f0f);}
.fc-back{background:linear-gradient(135deg,#0a1a0f,#0a120a);transform:rotateY(180deg);}
.qopt{display:block;width:100%;margin-bottom:8px;padding:13px 14px;background:var(--surf);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--txt);cursor:pointer;text-align:right;}
.qopt.ok{background:rgba(62,200,122,.15);color:var(--grn);}
.qopt.no{background:rgba(224,85,85,.15);color:var(--red);}
.wq-inp{width:100%;background:var(--surf2);border:2px solid #2a2a2a;border-radius:12px;color:var(--txt);font-family:'Playfair Display',serif;font-size:28px;padding:16px;outline:none;text-align:center;direction:ltr;transition:border-color .2s;}
.wq-inp:focus{border-color:var(--acc);}
.wq-inp.ok{border-color:var(--grn);background:rgba(62,200,122,.08);}
.wq-inp.no{border-color:var(--red);background:rgba(224,85,85,.08);}
.quiz-mode-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.quiz-mode-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s;}
.quiz-mode-tab.on{background:var(--acc);color:#fff;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.scard{background:var(--surf);border:none;border-radius:14px;padding:14px;text-align:center;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bitem{background:var(--surf2);border:none;border-radius:12px;padding:10px 8px;text-align:center;opacity:.4;}
.bitem.got{background:rgba(139,58,158,.15);opacity:1;}
.prog{height:4px;background:var(--surf2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.pfill{height:100%;background:var(--acc);border-radius:99px;transition:width .4s;}
.fov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.fsheet{background:#0f0f0f;border-radius:20px 20px 0 0;padding:20px 16px calc(36px + var(--safe-bot));width:100%;max-width:460px;}
.pill{padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;margin:3px;}
.sring{width:110px;height:110px;border-radius:50%;border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;background:rgba(139,58,158,.08);}
.empty{text-align:center;padding:40px 0;}
.back{background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
body.light{--bg:#f5f5f5;--surf:#ffffff;--surf2:#eeeeee;--txt:#141428;--mut:#7a6a88;--acc:#8b3a9e;--acc2:#9b4aae;}
body.light .hero{background:linear-gradient(160deg,#f0e8ff 0%,#e0c8f8 55%,#ece0ff 100%);}
body.light .header{background:rgba(245,245,245,.9);border-bottom:1px solid #e0e0e0;}
body.light .tabs{background:rgba(245,245,245,.9);border-top:1px solid #e0e0e0;}
body.light .auth-screen{background:radial-gradient(ellipse at top,#e8d0f8 0%,#f5f5f5 60%);}
body.light .auth-box{background:rgba(255,255,255,.95);}
.gram-cat{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gram-cat-head{width:100%;padding:16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-left:12px;flex-shrink:0;}
.gram-cat-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-rule-card{background:var(--surf2);border-radius:12px;padding:14px;margin-bottom:8px;}
.gram-rule-card:last-child{margin-bottom:0;}
.gram-rule-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:6px;}
.gram-rule-desc{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:10px;}
.gram-rule-ex{padding:8px 12px;border-radius:8px;font-size:13px;direction:ltr;text-align:left;margin-bottom:6px;}
.gram-rule-ok{background:rgba(62,200,122,.1);color:var(--grn);}
.gram-rule-no{background:rgba(224,85,85,.1);color:var(--red);}
.gram-rule-tip{font-size:12px;color:var(--acc2);background:rgba(139,58,158,.08);padding:8px 12px;border-radius:8px;margin-top:6px;}
.conj-table{width:100%;border-collapse:separate;border-spacing:0 6px;}
.conj-row td{padding:8px 12px;font-size:13px;}
.conj-row td:first-child{color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;width:45%;text-align:right;}
.conj-row td:last-child{color:var(--txt);direction:ltr;text-align:left;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;background:var(--surf2);border-radius:8px;cursor:pointer;}
.gl-level-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:12px;scrollbar-width:none;}
.gl-level-tabs::-webkit-scrollbar{display:none;}
.gl-level-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.gl-level-tab.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.gl-cat-card{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gl-cat-head{width:100%;padding:16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gl-cat-body{border-top:1px solid #1a1a1a;}
.gl-lesson{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);}
.gl-lesson:last-child{border-bottom:none;}
.gl-lesson:active{background:rgba(255,255,255,.04);}
.gl-detail{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;animation:up .3s ease;}
.gl-detail-header{position:sticky;top:0;background:var(--bg);padding:calc(16px + var(--safe-top)) 16px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1a1a1a;z-index:1;}
.gl-detail-body{padding:16px 16px calc(40px + var(--safe-bot));}
.gl-rule-box{background:rgba(139,58,158,.1);border:1px solid rgba(139,58,158,.25);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--acc2);direction:ltr;text-align:left;}

const LEVELS=["الكل","مبتدئ","متوسط","متقدم"];

const CICO={شغل:"💼",مشاعر:"❤️",شخصية:"🌟",تواصل:"🗣️",تقنية:"💻",عام:"🌐"};
const DAILY_GOAL=10;
const SB_URL="https://lqqhzjwqxwafsxkvlyli.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxcWh6andxeHdhZnN4a3ZseWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTk5MzQsImV4cCI6MjA5NjQ3NTkzNH0.pFWn7BIE2wQH0VfqhySqirNx6QoqRo2OB-RNXmnSQ8s";
const EL_KEY="sk_b8efa05e522f4638748a9d48e60cf771e80dd671594d6a78";
const YT_KEY="AIzaSyCP5k_uoUQZ58kOW2pfP9a1CEakgEyXfVE";
const EL_VOICE="EXAVITQu4vr4xnSDxMaL";
let st={words:[],saved:[],notes:{},curIdx:0,dark:true,fLevel:"الكل",fCat:"الكل",best:0,quizzes:0,streak:1,lastVisit:"",dailyCount:0,dailyDate:""};
let gen=false,curtab="home",fcIdx=0,fcFlip=false,fcDone=false;
let qqs=[],qcur=0,qsc=0,qsel=null,qdone=false;
let quizMode="choice";
let wqWord=null,wqDone=false,wqSc=0,wqTotal=0,wqList=[];
let libSel=null,tipOpen=false,gramOpen=false,noteEdit=false;
let currentUser=null,authToken=null,authMode="login";

function switchAuth(mode){authMode=mode;showEmailAuth();const tabs=document.querySelectorAll(".auth-tab");tabs.forEach(t=>t.classList.remove("on"));tabs.forEach(t=>{if((mode==="login"&&t.textContent.includes("دخول"))||(mode==="register"&&t.textContent.includes("إنشاء")))t.classList.add("on");});document.getElementById("authBtn").textContent=mode==="login"?"دخول":"إنشاء حساب";document.getElementById("authName").style.display=mode==="register"?"block":"none";document.getElementById("authMsg").textContent="";}
async function doAuth(){const email=document.getElementById("authEmail").value.trim();const pass=document.getElementById("authPass").value;const msg=document.getElementById("authMsg");if(!email||!pass){msg.className="auth-err";msg.textContent="أدخل الإيميل وكلمة المرور";return;}const btn=document.getElementById("authBtn");btn.textContent="⏳ جاري...";btn.disabled=true;try{const ep=authMode==="login"?"/auth/v1/token?grant_type=password":"/auth/v1/signup";const r=await fetch(SB_URL+ep,{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},body:JSON.stringify({email,password:pass})});const d=await r.json();if(d.error){msg.className="auth-err";msg.textContent=d.error_description||d.error;}else if(authMode==="register"&&!d.access_token){msg.className="auth-ok";msg.textContent="✅ تم الإنشاء! تحقق من إيميلك ثم سجّل دخول";switchAuth("login");}else{authToken=d.access_token;currentUser=d.user;localStorage.setItem("qulex_token",authToken);localStorage.setItem("qulex_user",JSON.stringify(currentUser));await loadUserSaves();showApp();}}catch(e){msg.className="auth-err";msg.textContent="خطأ في الاتصال";}btn.textContent=authMode==="login"?"دخول":"إنشاء حساب";btn.disabled=false;}
function skipAuth(){currentUser=null;authToken=null;showApp();}
async function loadUserSaves(){if(!authToken)return;try{const r=await fetch(SB_URL+"/rest/v1/user_saves?select=*",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}});const data=await r.json();if(Array.isArray(data)){st.saved=data.map(row=>row.data).filter(Boolean);save();}}catch(e){}}
async function syncSaveToCloud(word,remove=false){if(!authToken||!currentUser)return;if(remove){await fetch(SB_URL+`/rest/v1/user_saves?user_id=eq.${currentUser.id}&word=eq.${encodeURIComponent(word)}`,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}});}else{const w=st.saved.find(s=>s.word===word);if(!w)return;await fetch(SB_URL+"/rest/v1/user_saves",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+authToken,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_id:currentUser.id,word,data:w})});}}
async function doSignOut(){if(authToken){await fetch(SB_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}}).catch(()=>{});}localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");currentUser=null;authToken=null;document.getElementById("mainApp").style.display="none";document.getElementById("authScreen").style.display="flex";}
function showApp(){initParticles();document.getElementById("authScreen").style.display="none";document.getElementById("mainApp").style.display="block";initApp();}
function load(){try{const s=JSON.parse(localStorage.getItem("qulex_pwa")||"{}");st={...st,...s};const today=new Date().toDateString();const yest=new Date(Date.now()-86400000).toDateString();if(st.lastVisit===today){}else if(st.lastVisit===yest)st.streak=(st.streak||0)+1;else st.streak=1;st.lastVisit=today;if(st.dailyDate!==today){st.dailyCount=0;st.dailyDate=today;}}catch(e){}}
function save(){localStorage.setItem("qulex_pwa",JSON.stringify(st));}
function updHeader(){const el=document.getElementById("streakNum");if(el)el.textContent=st.streak;const av=document.getElementById("userAvatar");if(av){if(currentUser?.email){av.textContent=currentUser.email[0].toUpperCase();av.title=currentUser.email;}else av.textContent="👤";}}
async function nextWord(){tipOpen=false;gramOpen=false;noteEdit=false;gen=true;drawHome();const w=await fetchRandomWord();gen=false;if(w){const exists=st.words.findIndex(x=>x.word===w.word);if(exists===-1){st.words.push(w);st.curIdx=st.words.length-1;}else{st.curIdx=exists;}save();}drawHome();updCnt();}
function prevWord(){tipOpen=false;gramOpen=false;noteEdit=false;if(st.curIdx>0){st.curIdx--;save();drawHome();}}
async function spk(txt,rate=1){const btn=event?.currentTarget;if(btn&&btn.tagName==="BUTTON"){btn.textContent="⏳";btn.disabled=true;}try{const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+EL_VOICE,{method:"POST",headers:{"Content-Type":"application/json","xi-api-key":EL_KEY},body:JSON.stringify({text:txt,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.5,similarity_boost:0.75}})});if(!r.ok)throw new Error("EL failed");const blob=await r.blob();const url=URL.createObjectURL(blob);const audio=new Audio(url);audio.playbackRate=rate;audio.play();audio.onended=()=>URL.revokeObjectURL(url);}catch(e){if(window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang="en-US";u.rate=rate;const vs=window.speechSynthesis.getVoices();const v=vs.find(v=>v.lang.startsWith("en")&&v.localService)||vs.find(v=>v.lang.startsWith("en"));if(v)u.voice=v;window.speechSynthesis.speak(u);}}if(btn&&btn.tagName==="BUTTON"){btn.textContent="🔊 استمع";btn.disabled=false;}}
function esc(s){return(s||"").replace(/'/g,"\\'").replace(/"/g,'\\"');}

="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>جديدة</button>`:""}</div>${opts.save!==false?`<button class="save-btn ${saved?"saved":"unsaved"}" id="saveBtnEl" onclick="toggleSave('${esc(w.word)}')"><svg viewBox="0 0 24 24" fill="${saved?"currentColor":"none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${saved?"محفوظة ✓":"حفظ الكلمة"}</button>`:""} ${opts.next?`<p class="swipe-hint">← سويب للتنقل بين الكلمات →</p>`:""}</div><div class="card"><div class="lbl">📖 التعريف</div><p style="font-size:14px;line-height:1.75">${w.definition}</p></div><div class="card"><div class="lbl">💬 أمثلة</div>${w.examples.map(ex=>`<div class="ex-block"><div class="ex-row"><p class="ex-en">"${ex.en}"</p><button class="spk-sm" onclick="spk('${esc(ex.en)}',.85)">🔊</button></div><p class="ex-ar">${ex.ar}</p></div>`).join("")}</div>${w.conjugations&&w.type&&w.type.toLowerCase().includes('verb')?`<div class="card"><div class="lbl">⏰ تصريف الفعل</div><table class="conj-table"><tr class="conj-row"><td>المضارع</td><td onclick="spk(this.dataset.v,1)" data-v="${esc(w.conjugations.present||'')}">${w.conjugations.present||''} <span style="opacity:.35;font-size:11px">🔊</span></td></tr><tr class="conj-row"><td>الماضي</td><td onclick="spk(this.dataset.v,1)" data-v="${esc(w.conjugations.past||'')}">${w.conjugations.past||''} <span style="opacity:.35;font-size:11px">🔊</span></td></tr><tr class="conj-row"><td>التصريف الثالث</td><td onclick="spk(this.dataset.v,1)" data-v="${esc(w.conjugations.past_participle||'')}">${w.conjugations.past_participle||''} <span style="opacity:.35;font-size:11px">🔊</span></td></tr><tr class="conj-row"><td>المستمر</td><td onclick="spk(this.dataset.v,1)" data-v="${esc(w.conjugations.continuous||'')}">${w.conjugations.continuous||''} <span style="opacity:.35;font-size:11px">🔊</span></td></tr><tr clas click="toggleNote('${esc(w.word)}')" style="background:none;border:none;color:var(--acc);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer" id="noteBtnEl">${noteEdit?"حفظ ✓":"تعديل ✏️"}</button></div><div id="noteDispEl" style="font-size:13px;color:${note?"var(--txt)":"var(--mut)"};line-height:1.6;min-height:30px;display:${noteEdit?"none":"block"}">${note||"لا توجد ملاحظة — اضغط تعديل"}</div><textarea id="noteInpEl" class="note-ta" style="display:${noteEdit?"block":"none"}">${note}</textarea></div>${opts.del?`<button class="btn-d" onclick="delWord('${esc(w.word)}')">🗑 حذف من المكتبة</button>`:""}`;}
function toggleTip(){tipOpen=!tipOpen;const b=document.getElementById("tipBtnEl");const d=document.getElementById("tipBoxEl");if(b)b.textContent=tipOpen?"💡 إخفاء النصيحة":"💡 نصيحة لتذكر الكلمة";if(d)d.style.display=tipOpen?"block":"none";}

function drawHome(){const d=document.getElementById("homeDiv");const hasF=st.fLevel!=="الكل"||st.fCat!=="الكل";let filterLabel="فلترة الكلمات";if(hasF){let parts=[];if(st.fLevel!=="الكل")parts.push(st.fLevel);if(st.fCat!=="الكل")parts.push((CICO[st.fCat]||"")+" "+st.fCat);filterLabel=parts.join(" · ");}let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><button onclick="openFilt()" style="display:flex;align-items:center;gap:6px;background:${hasF?"var(--acc)":"none"};border:1px solid ${hasF?"var(--acc)":"#2a2a2a"};border-radius:20px;padding:7px 14px;color:${hasF?"#fff":"var(--mut)"};font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;">🎯 ${filterLabel}</button><span style="font-size:11px;color:var(--mut)">${totalWordsCount||st.words.length} كلمة</span></div>`;if(gen){h+=`<div class="gen-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="font-size:13px;color:var(--mut)">جاري التحميل...</span></div>`;}else{const w=st.words[st.curIdx];if(w)h+=wordHTML(w,{next:true,save:true});else h+=`<div class="empty"><div style="font-size:56px;margin-bottom:12px">✨</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">ابدأ رحلتك!</h2><button onclick="location.reload()" style="padding:13px 36px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer">تحديث 🔄</button></div>`;}d.innerHTML=h;}

"font-size:10px;color:var(--grn);font-weight:700;letter-spacing:1px;text-transform:uppercase">المعنى</div><div style="font-size:26px;font-weight:800">${w.arabic}</div><div style="font-size:12px;color:var(--mut);text-align:center;padding:0 14px;line-height:1.6">${w.definition}</div></div></div></div>${fcFlip?`<div style="display:flex;gap:10px;margin-bottom:10px"><button style="flex:1;padding:13px;background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer" onclick="gradeFC(false)">❌ ما تذكرتها</button><button style="flex:1;padding:13px;background:rgba(62,200,122,.15);color:var(--grn);border:1px solid rgba(62,200,122,.3);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer" onclick="gradeFC(true)">✅ تذكرتها</button></div>`:""}<div style="display:flex;gap:10px"><button class="btn-s" style="flex:1" ${fcIdx===0?"disabled":""} onclick="prevFC()">← السابق</button><button style="flex:1;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer" onclick="nextFC()">${fcIdx+1>=st.saved.length?"إنهاء ✓":"تخطّي →"}</button></div>`;}
function flipFC(){fcFlip=!fcFlip;drawFlash();}
function gradeFC(correct){const deck=srOrdered();const w=deck[fcIdx];if(w)srReview(w.word,correct);if(fcIdx+1>=st.saved.length)fcDone=true;else{fcIdx++;fcFlip=false;}drawFlash();}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function drawQuiz(){const d=document.getElementById("quizDiv");if(st.saved.length<3){d.innerHTML=`<div class="empty"><div style="font-size:44px">📚</div><p style="font-weight:700;margin-top:8px">تحتاج 3 كلمات على الأقل</p></div>`;return;}if(quizMode==="writing"){drawWritingQuiz();return;}if(!qqs.length){d.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 0;gap:12px"><div class="quiz-mode-tabs" style="width:100%;max-width:280px;"><button class="quiz-mode-tab on" onclick="setQuizMode('choice')">🔤 اختيار</button><button class="quiz-mode-tab" onclick="setQuizMode('writing')">✍️ كتابة</button></div><span style="font-size:56px">🧠</span><h2 style="font-size:20px;font-weight:800">اختبر معلوماتك</h2><p style="font-size:13px;color:var(--mut)">سيتم اختبارك على ${Math.min(st.saved.length,8)} كلمات${srDueCount()>0?` · ⏰ ${srDueCount()} مستحقة`:""}</p><button onclick="startQuiz()" style="padding:13px 40px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer">ابدأ الاختبار</button></div>`;return;}if(qdone){const pct=Math.round((qsc/qqs.length)*100);d.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 0;gap:12px"><div class="sring"><span style="font-size:28px;font-weight:800;color:var(--acc)">${pct}%</span></div><h2 style="font-size:20px;font-weight:800">${pct>=80?"ممتاز! 🎉":pct>=50?"جيد 👍":"استمر 💪"}</h2><p style="font-size:13px;color:var(--mut)">${qsc} من ${qqs.length} إجابة صحيحة</p><p style="font-size:11px;color:var(--acc2)">✓ تم تحديث جدول مراجعتك تلقائياً</p><div style="display:flex;gap:10px"><button onclick="startQuiz()" style="padding:13px 28px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer">أعد الاختبار</button><button onclick="resetQuiz()" class="btn-s" style="padding:13px 24px const SR_DAY=86400000;
function srInit(w){
  if(w.srEase===undefined)w.srEase=2.5;
  if(w.srInterval===undefined)w.srInterval=0;
  if(w.srReps===undefined)w.srReps=0;
  if(w.srDue===undefined)w.srDue=Date.now();
  if(w.srLast===undefined)w.srLast=0;
  return w;
}
function srIsDue(w){srInit(w);return w.srDue<=Date.now();}
function srDaysLeft(w){srInit(w);return Math.ceil((w.srDue-Date.now())/SR_DAY);}
function srReview(word,correct){
  const w=st.saved.find(s=>s.word===word);
  if(!w)return;
  srInit(w);
  w.srLast=Date.now();
  if(correct){
    w.srReps++;
    if(w.srReps===1)w.srInterval=1;
    else if(w.srReps===2)w.srInterval=3;
    else w.srInterval=Math.round(w.srInterval*w.srEase);
    w.srEase=Math.min(w.srEase+0.1,3.0);
  }else{
    w.srReps=0;
    w.srInterval=0;
    w.srEase=Math.max(w.srEase-0.2,1.3);
  }
  w.srDue=Date.now()+w.srInterval*SR_DAY;
  save();
  syncSaveToCloud(word);
}
function srDueCount(){return st.saved.filter(srIsDue).length;}
function srOrdered(){return [...st.saved].map(srInit).sort((a,b)=>a.srDue-b.srDue);}

let grammarData={},grammarLoaded=false,grammarLevel='A1',grammarCatOpen=-1;

async function loadGrammarLessons(){
  if(grammarLoaded)return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/grammar_lessons?select=*&order=order_num',{headers:{'apikey':SB_KEY}});
    const data=await r.json();
    if(Array.isArray(data)&&data.length>0){
      grammarData={};
      data.forEach(l=>{
        if(!grammarData[l.level])grammarData[l.level]={};
        if(!grammarData[l.level][l.category])grammarData[l.level][l.category]=[];
        grammarData[l.level][l.category].push(l);
      });
      grammarLoaded=true;
    }else{grammarLoaded=false;}
  }catch(e){console.error('Grammar load error:',e);grammarLoaded=false;}
}

  try{exercises=typeof lesson.exercises==='string'?JSON.parse(lesson.exercises):(lesson.exercises||[]);}catch(e){}
  _gldLesson=lesson;
  _gldAllExamples=[...examples,...examplesExtra];
  _gldExercises=exercises;
  const diff=lesson.difficulty_score||1;
  const lc={A1:'#3ec87a',A2:'#4ab8f0',B1:'#f0c030','B1+':'#f09030',B2:'#e05555',C1:'#c47abf'}[lesson.level]||'var(--acc)';
  gldTab='learn';
  gldQuiz={idx:0,sel:null,score:0,done:false,exercises};
  const detail=document.createElement('div');
  detail.className='gl-detail';detail.id='gramDetailOverlay';
  detail.innerHTML=`
    <div class="gl-detail-header">
      <button onclick="closeGrammarLesson()" style="background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;padding:0;line-height:1;">←</button>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:800;">${lesson.title_en}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:2px;direction:ltr;">${lesson.level} · ${lesson.category}</div>
      </div>
      <div style="display:flex;gap:2px;">${[1,2,3,4,5].map(i=>`<span style="font-size:12px;opacity:${i<=diff?'1':'0.2'};">⭐</span>`).join('')}</div>
    </div>
    <div class="gl-detail-body" id="gldBody">
      <div class="gld-hero">
        <span class="gld-level-badge" style="background:${lc}22;color:${lc};border:1px solid ${lc}44;">${lesson.level} · ${lesson.category}</span>
        <div style="font-size:21px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.3;">${lesson.title_en}</div>
        ${lesson.explanation_ar?`<div style="height:1px;background:rgba(255,255,255,.08);margin:10px 0;"></div><div style="font-size:13px;color:rgba(255,255,255,.6);line-height:1.75;text-align:right;">${lesson.explanation_ar}</div>`:''}
      </div>
      <div class="gld-tabs">
        <button class="gld-tab on" id="gldTabLearn" onclick="switchGldTab('learn')">📖 تعلّم</button>
        <button class="gld-tab" id="gldTabPractice" onclick="switchGldTab('practice')">🧪 تدرّب</button>
        ${exercises.length?`<button class="gld-tab" id="gldTabQuiz" onclick="switchGldTab('quiz')">✅ اختبر</button>`:''}
      </div>
      <div id="gldTabContent" class="gld-tab-panel"></div>
    </div>`;
  document.body.appendChild(detail);
  renderGldTabDirect('learn');
}

function switchGldTab(tab){
  gldTab=tab;
  document.querySelectorAll('.gld-tab').forEach(t=>t.classList.remove('on'));
  const map={learn:'gldTabLearn',practice:'gldTabPractice',quiz:'gldTabQuiz'};
  const el=document.getElementById(map[tab]);if(el)el.classList.add('on');
  renderGldTabDirect(tab);
}

function renderGldTabDirect(tab){
  const c=document.getElementById('gldTabContent');
  if(!c||!_gldLesson)return;
  const lesson=_gldLesson;
  const allExamples=_gldAllExamples;
  const exercises=_gldExercises;
  if(tab==='learn'){
    const okEx=allExamples.filter(e=>e.ok).slice(0,2);
    c.innerHTML=`
      <div class="gld-section">
        <div class="gld-section-title">📐 القاعدة</div>
        <div class="gld-rule"><div class="gld-rule-text">${lesson.rule}</div></div>
        <p style="font-size:14px;line-height:1.85;color:var(--txt);direction:ltr;">${lesson.explanation}</p>
      </div>
      ${lesson.explanation_ar?`<div class="gld-section"><div class="gld-section-title">🇸🇦 الشرح بالعربي</div><div class="gld-ar-box">${lesson.explanation_ar}</div></div>`:''}
      ${okEx.length?`<div class="gld-section"><div class="gld-section-title">💬 أمثلة سريعة</div>${okEx.map(ex=>`<div class="gld-ex gld-ex-ok"><span class="gld-ex-icon">✅</span><span>${ex.en}</span></div>`).join('')}</div>`:''}
      <div class="gld-tip"><span style="font-size:20px;flex-shrink:0;">💡</span><span style="line-height:1.7;">${lesson.tip}</span></div>`;
  }
  else if(tab==='practice'){
    const okEx=allExamples.filter(e=>e.ok);
    const noEx=allExamples.filter(e=>!e.ok);
    c.innerHTML=`
      <div class="gld-section">
        <div class="gld-section-title">✅ أمثلة صحيحة</div>
        ${okEx.map(ex=>`<div class="gld-ex gld-ex-ok"><span class="gld-ex-icon">✅</span><span>${ex.en}</span></div>`).join('')}
      </div>
      <div class="gld-section">
        <div class="gld-section-title">❌ أمثلة خاطئة — اعرف ليش!</div>
        ${noEx.map(ex=>`<div class="gld-ex gld-ex-no"><span class="gld-ex-icon">❌</span><span>${ex.en}</span></div>`).join('')}
      </div>
      <div class="gld-tip"><span style="font-size:20px;flex-shrink:0;">💡</span><span style="line-height:1.7;">${lesson.tip}</span></div>`;
  }
  else if(tab==='quiz'){renderGldQuiz(c,exercises);}
}

function renderGldQuiz(c,exercises){
  if(!exercises||!exercises.length){c.innerHTML=`<div class="empty"><p>لا توجد تمارين</p></div>`;return;}
  if(gldQuiz.done){
    const pct=Math.round((gldQuiz.score/exercises.length)*100);
    const msg=pct===100?'🎉 مثالي!':pct>=66?'👍 ممتاز!':pct>=33?'💪 استمر!':'📖 راجع الدرس';
    c.innerHTML=`
      <div class="gld-complete-badge">
        <div style="font-size:52px;margin-bottom:8px;">${pct===100?'🏆':pct>=66?'⭐':'💪'}</div>
        <div style="font-size:32px;font-weight:800;color:var(--grn);margin-bottom:4px;">${pct}%</div>
        <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">${msg}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4);">${gldQuiz.score} من ${exercises.length} إجابات صحيحة</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="restartGldQuiz()" style="flex:1;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">🔄 أعد الاختبار</button>
        <button onclick="switchGldTab('learn')" style="flex:1;padding:13px;background:var(--surf2);color:var(--txt);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;">📖 راجع</button>
      </div>`;return;
  }
  const q=exercises[gldQuiz.idx];
  const progress=(gldQuiz.idx/exercises.length)*100;
  c.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:11px;color:var(--mut);">سؤال ${gldQuiz.idx+1} من ${exercises.length}</span>
      <span style="font-size:11px;color:var(--acc2);font-weight:700;">✅ ${gldQuiz.score} صح</span>
    </div>
    <div class="prog" style="margin-bottom:16px;"><div class="pfill" style="width:${progress}%"></div></div>
    <div class="gld-quiz-q">${q.q}</div>
    <div id="gldOpts">
      ${q.options.map((opt,i)=>`<button class="gld-quiz-opt" id="gldOpt${i}" onclick="ansGldQuiz(${i},${q.answer})" ${gldQuiz.sel!==null?'disabled':''}><span style="color:var(--mut);margin-left:8px;font-size:12px;">${String.fromCharCode(65+i)}</span> ${opt}</button>`).join('')}
    </div>
    <div id="gldNextWrap" style="display:${gldQuiz.sel!==null?'block':'none'};margin-top:12px;">
      <button onclick="nextGldQuiz()" style="width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">${gldQuiz.idx+1>=exercises.length?'إنهاء ✓':'السؤال التالي →'}</button>
    </div>`;
}

function ansGldQuiz(sel,correct){
  if(gldQuiz.sel!==null)return;
  gldQuiz.sel=sel;
  if(sel===correct)gldQuiz.score++;
  document.querySelectorAll('.gld-quiz-opt').forEach((btn,i)=>{btn.disabled=true;if(i===correct)btn.classList.add(sel===correct?'ok':'reveal');else if(i===sel)btn.classList.add('no');});
  document.getElementById('gldNextWrap').style.display='block';
}

function nextGldQuiz(){
  gldQuiz.idx++;gldQuiz.sel=null;
  if(gldQuiz.idx>=gldQuiz.exercises.length)gldQuiz.done=true;
  const c=document.getElementById('gldTabContent');if(c)renderGldQuiz(c,gldQuiz.exercises);
}

function restartGldQuiz(){
  gldQuiz.idx=0;gldQuiz.sel=null;gldQuiz.score=0;gldQuiz.done=false;
  const c=document.getElementById('gldTabContent');if(c)renderGldQuiz(c,gldQuiz.exercises);
}

function closeGrammarLesson(){const el=document.getElementById('gramDetailOverlay');if(el)el.remove();}

// =============================================
// YOUTUBE
// =============================================
let ytVideos=[],ytIdx=0,ytWord="";
async function loadYTVideos(word){ytWord=word;ytIdx=0;ytVideos=[];const div=document.getElementById("ytIframeEl");div.innerHTML=`<div style="padding:20px;text-align:center;"><span style="font-size:13px;color:var(--mut)">⏳ جاري البحث...</span></div>`;try{const q=encodeURIComponent('"'+word+'" english speaking');const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=5&videoCaption=closedCaption&relevanceLanguage=en&key=${YT_KEY}`);const d=await r.json();ytVideos=(d.items||[]).map(i=>i.id.videoId).filter(Boolean);if(ytVideos.length>0){showYTVideo();}else{div.innerHTML=`<p style="text-align:center;color:var(--mut);padding:20px;font-size:13px;">لم يتم العثور على مقطع</p>`;}}catch(e){div.innerHTML=`<p style="text-align:center;color:var(--red);padding:20px;font-size:13px;">تعذّر التحميل</p>`;}}
function showYTVideo(){const div=document.getElementById("ytIframeEl");const vid=ytVideos[ytIdx];const hasNext=ytIdx<ytVideos.length-1;const hasPrev=ytIdx>0;div.innerHTML=`<iframe width="100%" height="200" src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&playsinline=1" frameborder="0" allow="autoplay;encrypted-media" style="display:block;border:none;border-radius:10px 10px 0 0;"></iframe><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surf2);border-radius:0 0 10px 10px;"><button onclick="prevYT()" ${hasPrev?"":"disabled"} style="background:none;border:none;color:${hasPrev?"var(--acc)":"var(--mut)"};font-size:18px;cursor:pointer;padding:4px 8px;">‹</button><span style="font-size:11px;color:var(--mut)">${ytIdx+1} / ${ytVideos.length}</span><button onclick="nextYT()" ${hasNext?"":"disabled"} style="background:none;border:none;color:${hasNext?"var(--acc)":"var(--mut)"};font-size:18px;cursor:pointer;padding:4px 8px;">›</button></div>`;}
function nextYT(){if(ytIdx<ytVideos.length-1){ytIdx++;showYTVideo();}}
function prevYT(){if(ytIdx>0){ytIdx--;showYTVideo();}}
async function toggleYT(word){const frame=document.getElementById("ytFrameEl");const btn=document.getElementById("ytBtnEl");if(!frame||!btn)return;if(frame.style.display==="none"||!frame.style.display){frame.style.display="block";const div=document.getElementById("ytIframeEl");if(!div.dataset.loaded||ytWord!==word){div.dataset.loaded="1";await loadYTVideos(word);}btn.textContent="✕ إغلاق المقطع";btn.style.background="rgba(255,50,50,.2)";}else{frame.style.display="none";btn.textContent="▶ شغّل مقطع يوتيوب";btn.style.background="";}}

// =============================================
// WORD BUFFER
// =============================================
let totalWordsCount=0,wordBuffer=[],bufferFilling=false;
async function fillBuffer(){if(bufferFilling)return;bufferFilling=true;try{const lvl=st.fLevel!=="الكل"?st.fLevel:null;const cat=st.fCat!=="الكل"?st.fCat:null;const body={p_limit:20};if(lvl)body.p_level=lvl;if(cat)body.p_cat=cat;const r=await fetch(SB_URL+"/rest/v1/rpc/get_random_words",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+(authToken||SB_KEY)},body:JSON.stringify(body)});const data=await r.json();if(Array.isArray(data)&&data.length>0){const inBuffer=new Set(wordBuffer.map(w=>w.word.toLowerCase()));data.filter(w=>w&&!inBuffer.has(w.word.toLowerCase())).forEach(w=>{wordBuffer.push(w);});if(!totalWordsCount)totalWordsCount=700;}}catch(e){}bufferFilling=false;}
async function fetchRandomWord(){if(wordBuffer.length===0)await fillBuffer();const currentWord=st.words[st.curIdx]?.word?.toLowerCase()||"";let word=null;for(let i=0;i<wordBuffer.length;i++){if(wordBuffer[i].word.toLowerCase()!==currentWord){word=wordBuffer.splice(i,1)[0];break;}}if(!word&&wordBuffer.length>0)word=wordBuffer.shift();if(wordBuffer.length<5)fillBuffer();return word;}
async function fetchWords(){const w=await fetchRandomWord();if(w){if(!st.words.find(x=>x.word===w.word))st.words.push(w);st.curIdx=st.words.length-1;save();drawHome();updCnt();}}

// =============================================
// AUTH HELPERS
// =============================================
function signInWithApple(){alert("Apple Sign-In قريباً!");}
function signInWithGoogle(){alert("Google Sign-In قريباً!");}
function showEmailAuth(){document.getElementById("authMain").style.display="none";document.getElementById("authEmailForm").style.display="block";}
function hideEmailAuth(){document.getElementById("authEmailForm").style.display="none";document.getElementById("authMain").style.display="block";}
function initParticles(){const c=document.getElementById("authParticles");if(!c)return;c.innerHTML="";for(let i=0;i<30;i++){const s=document.createElement("span");const sz=1+Math.random()*3;s.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s;width:${sz}px;height:${sz}px;`;c.appendChild(s);}}
function initApp(){load();if(!st.dark)document.body.classList.add("light");st.saved.forEach(srInit);save();updCnt();window.speechSynthesis?.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();if(st.words&&st.words.length>0){if(st.curIdx<0||st.curIdx>=st.words.length)st.curIdx=0;drawHome();}else{document.getElementById("homeDiv").innerHTML=`<div style="text-align:center;padding:60px 20px;"><div class="gen-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:13px;color:var(--mut);margin-top:12px;">جاري تحميل الكلمات...</p></div>`;}fetchWords();setTimeout(()=>fillBuffer(),2000);if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}}

// =============================================
// INIT
// =============================================
load();
if(!st.dark)document.body.classList.add("light");
const savedToken=localStorage.getItem("qulex_token");
const savedUser=localStorage.getItem("qulex_user");
if(savedToken&&savedUser){
  try{
    authToken=savedToken;currentUser=JSON.parse(savedUser);
    fetch(SB_URL+"/auth/v1/user",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}})
      .then(r=>r.json())
      .then(async d=>{if(d.id){await loadUserSaves();showApp();}else{localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");document.getElementById("authScreen").style.display="flex";initParticles();}})
      .catch(()=>{showApp();});
  }catch(e){document.getElementById("authScreen").style.display="flex";initParticles();}
}else{document.getElementById("authScreen").style.display="flex";initParticles();}
</script>
