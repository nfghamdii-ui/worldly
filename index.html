<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MARS"/>
<meta name="theme-color" content="#8b3a9e"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>MARS — تعلم الإنجليزية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000000;--surf:#0f0f0f;--surf2:#1a1a1a;--acc:#8b3a9e;--acc2:#c47abf;--grn:#3ec87a;--red:#e05555;--txt:#ebebf5;--mut:#666680;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
.app{max-width:460px;margin:0 auto;min-height:100vh;}
/* AUTH SCREEN - Full splash style */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#000;}
.auth-bg{position:absolute;inset:0;background:linear-gradient(to bottom,#0a0018 0%,#080015 30%,#030008 60%,#000000 75%,#000000 100%);z-index:0;}
.auth-bg::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(100,30,140,.25) 0%,transparent 55%),radial-gradient(ellipse at 80% 50%,rgba(20,50,180,.18) 0%,transparent 50%),radial-gradient(ellipse at 50% 85%,rgba(15,30,100,.12) 0%,transparent 40%);z-index:1;}
.auth-particles{position:absolute;inset:0;z-index:1;overflow:hidden;}
.auth-particles span{position:absolute;width:2px;height:2px;background:#c47abf;border-radius:50%;animation:float linear infinite;opacity:.6;}
@keyframes float{0%{transform:translateY(100vh) scale(0);}100%{transform:translateY(-10px) scale(1);opacity:0;}}
.auth-top{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 28px 32px;}
.auth-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(139,58,158,.2);border:1px solid rgba(196,122,191,.3);border-radius:20px;padding:5px 12px;margin-bottom:20px;backdrop-filter:blur(10px);}
.auth-badge-dot{width:6px;height:6px;background:var(--acc2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.auth-badge span{font-size:11px;color:var(--acc2);font-weight:600;letter-spacing:.5px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:72px;font-weight:700;color:#fff;line-height:1;letter-spacing:-3px;direction:ltr;position:absolute;top:15%;left:28px;z-index:3;}
.auth-logo span{color:var(--acc2);}
.auth-tagline{font-size:clamp(13px,4vw,20px);font-weight:400;color:rgba(255,255,255,.7);line-height:1.4;margin-bottom:0;text-align:left;white-space:nowrap;}
.auth-tagline strong{color:#fff;font-weight:700;}
.auth-bottom{position:relative;z-index:2;padding:0 20px calc(32px + var(--safe-bot));background:linear-gradient(to top,#000 60%,transparent);}
.auth-box{width:100%;background:none;border:none;padding:0;margin-bottom:12px;}
.auth-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;margin-bottom:16px;gap:3px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;}
.auth-tab.on{background:var(--acc);color:#fff;}
.auth-inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;padding:12px 14px;outline:none;margin-bottom:8px;direction:ltr;text-align:left;transition:border-color .2s;}
.auth-inp:focus{border-color:var(--acc2);}
.auth-inp::placeholder{color:rgba(255,255,255,.3);direction:rtl;text-align:right;}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),#c044d8);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 24px rgba(139,58,158,.5);letter-spacing:.5px;}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
.auth-ok{font-size:12px;color:var(--grn);text-align:center;margin-top:8px;min-height:16px;}
.auth-skip{width:100%;background:none;border:none;color:rgba(255,255,255,.35);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;padding:10px;text-align:center;}
.social-btn{width:100%;padding:15px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:background .2s;}
.social-btn:active{background:rgba(255,255,255,.12);}
.social-btn-email{background:var(--acc);border-color:var(--acc);font-size:15px;font-weight:700;box-shadow:0 4px 20px rgba(139,58,158,.5);}
.social-btn-email:active{background:#7a2d8e;}
.auth-divider{display:none;}
.header{display:none!important;}
.logo-en{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--acc);line-height:1;}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(240,160,48,.12);border-radius:20px;padding:5px 10px;font-size:12px;color:#f0a030;font-weight:700;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;cursor:pointer;}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:50;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:10px 16px calc(10px + var(--safe-bot));display:flex;gap:4px;align-items:center;justify-content:center;}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-radius:30px;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab.on{background:var(--acc);color:#fff;padding:10px 16px;flex:0 0 auto;box-shadow:0 0 16px rgba(139,58,158,.5);}
.tab.on .tab-label{display:inline;}
.tab:not(.on) .tab-label{display:none;}
.tab-icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.content{padding:calc(16px + var(--safe-top)) 16px calc(80px + var(--safe-bot));overflow-y:auto;height:100vh;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.page{display:none;}
.page.on{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes wordIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@keyframes saveAnim{0%{transform:scale(1);}30%{transform:scale(1.25);}60%{transform:scale(.95);}100%{transform:scale(1);}}
@keyframes ripple{0%{transform:scale(0);opacity:.6;}100%{transform:scale(2.5);opacity:0;}}
.word-anim{animation:wordIn .4s cubic-bezier(.34,1.1,.64,1);}
.save-anim{animation:saveAnim .3s ease;}
.card{background:rgba(15,15,15,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px;margin-bottom:8px;}
.card:active{transform:scale(.99);}
.lbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;text-align:right;}
.hero{background:linear-gradient(160deg,rgba(26,8,40,.85) 0%,rgba(20,5,35,.9) 55%,rgba(15,10,26,.85) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(196,122,191,.15);border-radius:22px;padding:24px 20px 20px;text-align:center;margin-bottom:8px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(139,58,158,.2),inset 0 1px 0 rgba(255,255,255,.05);}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(139,58,158,.25) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:"";position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(196,122,191,.12) 0%,transparent 70%);pointer-events:none;}
.daily-bar-wrap{position:relative;z-index:1;margin-bottom:16px;}
.daily-label{font-size:11px;color:var(--mut);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.daily-label span:last-child{color:var(--acc2);font-weight:700;}
.daily-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.daily-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(196,122,191,.4);}
.word-big{font-family:'Playfair Display',serif;font-size:58px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-2px;position:relative;z-index:1;text-shadow:0 0 40px rgba(196,122,191,.3);}
.word-ph{direction:ltr;color:var(--mut);font-size:13px;margin-bottom:10px;position:relative;z-index:1;}
.word-ar{font-size:26px;font-weight:800;color:var(--acc2);margin-bottom:14px;position:relative;z-index:1;}
.btns3{display:flex;gap:6px;position:relative;z-index:1;}
.abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:30px;padding:10px 4px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;}
.save-btn{margin-top:10px;position:relative;z-index:1;width:100%;padding:13px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.save-btn.unsaved{background:rgba(139,58,158,.15);color:var(--acc2);}
.save-btn.saved{background:var(--grn);color:#fff;}
.save-btn svg{width:18px;height:18px;transition:all .2s;}
.swipe-hint{font-size:11px;color:var(--mut);text-align:center;margin-top:10px;position:relative;z-index:1;opacity:.5;}
.yt-btn{width:100%;padding:11px;background:rgba(255,50,50,.08);color:#ff5050;border:1px dashed rgba(255,50,50,.2);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.yt-frame{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a;}
.gen-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;margin-bottom:8px;background:var(--surf);border-radius:14px;}
.dot{width:8px;height:8px;background:var(--acc);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.ex-block{border-right:3px solid var(--acc2);padding-right:10px;margin-bottom:12px;}
.ex-block:last-child{margin-bottom:0;}
.ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ex-en{font-size:13px;font-style:italic;direction:ltr;text-align:left;flex:1;margin-bottom:3px;}
.ex-ar{font-size:12px;color:var(--mut);}
.spk-sm{background:none;border:1px solid #2a2a2a;border-radius:20px;padding:3px 8px;color:var(--mut);font-size:11px;cursor:pointer;flex-shrink:0;font-family:'Tajawal',sans-serif;}
.gram-head{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;direction:ltr;text-align:left;margin-bottom:8px;}
.gram-ok{background:rgba(62,200,122,.1);}
.gram-no{background:rgba(224,85,85,.1);}
.gram-note{background:var(--surf2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--mut);line-height:1.6;}
.tip-btn{width:100%;background:none;border:1px dashed #2a2a2a;border-radius:10px;color:var(--acc);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px;cursor:pointer;}
.tip-box{margin-top:8px;padding:10px;background:rgba(139,58,158,.08);border-radius:10px;font-size:13px;color:var(--acc2);line-height:1.65;}
.note-ta{width:100%;background:var(--surf2);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:80px;direction:rtl;}
.btn-p{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn-s{padding:13px;background:var(--surf2);color:var(--txt);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;}
.btn-d{padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.srch{width:100%;background:var(--surf);border:none;border-radius:10px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;padding:11px 14px;outline:none;margin-bottom:8px;}
.lcard{background:rgba(15,15,15,.8);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;position:relative;transition:border-color .2s,transform .15s;}
.lcard:active{transform:scale(.98);border-color:rgba(196,122,191,.3);}
.lcard:active{transform:scale(.98);background:var(--surf2);}
.fc-wrap{cursor:pointer;min-height:220px;margin-bottom:16px;}
.fc-inner{position:relative;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:220px;}
.fc-inner.flip{transform:rotateY(180deg);}
.fc-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:36px 24px;text-align:center;position:absolute;top:0;left:0;width:100%;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.fc-front{background:linear-gradient(135deg,#1a0a20,#0f0f0f);}
.fc-back{background:linear-gradient(135deg,#0a1a0f,#0a120a);transform:rotateY(180deg);}
.qopt{display:block;width:100%;margin-bottom:8px;padding:13px 14px;background:var(--surf);border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--txt);cursor:pointer;text-align:right;}
.qopt.ok{background:rgba(62,200,122,.15);color:var(--grn);}
.qopt.no{background:rgba(224,85,85,.15);color:var(--red);}
.wq-inp{width:100%;background:var(--surf2);border:2px solid #2a2a2a;border-radius:12px;color:var(--txt);font-family:'Playfair Display',serif;font-size:28px;padding:16px;outline:none;text-align:center;direction:ltr;transition:border-color .2s;}
.wq-inp:focus{border-color:var(--acc);}
.wq-inp.ok{border-color:var(--grn);background:rgba(62,200,122,.08);}
.wq-inp.no{border-color:var(--red);background:rgba(224,85,85,.08);}
.quiz-mode-tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.quiz-mode-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s;}
.quiz-mode-tab.on{background:var(--acc);color:#fff;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.scard{background:var(--surf);border:none;border-radius:14px;padding:14px;text-align:center;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bitem{background:var(--surf2);border:none;border-radius:12px;padding:10px 8px;text-align:center;opacity:.4;}
.bitem.got{background:rgba(139,58,158,.15);opacity:1;}
.prog{height:4px;background:var(--surf2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.fov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.fsheet{background:#0f0f0f;border-radius:20px 20px 0 0;padding:20px 16px calc(36px + var(--safe-bot));width:100%;max-width:460px;}
.pill{padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;margin:3px;}
.sring{width:110px;height:110px;border-radius:50%;border:4px solid var(--acc);display:flex;align-items:center;justify-content:center;background:rgba(139,58,158,.08);}
.empty{text-align:center;padding:40px 0;}
.back{background:none;border:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
body.light{--bg:#f5f5f5;--surf:#ffffff;--surf2:#eeeeee;--txt:#141428;--mut:#7a6a88;--acc:#8b3a9e;--acc2:#9b4aae;}
body.light .hero{background:linear-gradient(160deg,#f0e8ff 0%,#e0c8f8 55%,#ece0ff 100%);}
body.light .header{background:rgba(245,245,245,.9);border-bottom:1px solid #e0e0e0;}
body.light .tabs{background:rgba(245,245,245,.9);border-top:1px solid #e0e0e0;}
body.light .auth-screen{background:radial-gradient(ellipse at top,#e8d0f8 0%,#f5f5f5 60%);}
body.light .auth-box{background:rgba(255,255,255,.95);}
.gram-cat{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gram-cat-head{width:100%;padding:16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Tajawal',sans-serif;}
.gram-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-left:12px;flex-shrink:0;}
.gram-cat-body{padding:0 16px 16px;border-top:1px solid #1a1a1a;}
.gram-rule-card{background:var(--surf2);border-radius:12px;padding:14px;margin-bottom:8px;}
.gram-rule-card:last-child{margin-bottom:0;}
.gram-rule-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:6px;}
.gram-rule-desc{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:10px;}
.gram-rule-ex{padding:8px 12px;border-radius:8px;font-size:13px;direction:ltr;text-align:left;margin-bottom:6px;}
.gram-rule-ok{background:rgba(62,200,122,.1);color:var(--grn);}
.gram-rule-no{background:rgba(224,85,85,.1);color:var(--red);}
.gram-rule-tip{font-size:12px;color:var(--acc2);background:rgba(139,58,158,.08);padding:8px 12px;border-radius:8px;margin-top:6px;}
.conj-table{width:100%;border-collapse:separate;border-spacing:0 6px;}
.conj-row td{padding:8px 12px;font-size:13px;}
.conj-row td:first-child{color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;width:45%;text-align:right;}
.conj-row td:last-child{color:var(--txt);direction:ltr;text-align:left;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;background:var(--surf2);border-radius:8px;cursor:pointer;}
.gl-level-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.gl-level-tab{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:var(--mut);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.gl-level-tab.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.gl-cat-card{background:var(--surf);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.gl-cat-head{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;direction:ltr;font-family:'Tajawal',sans-serif;}
.gl-cat-body{border-top:1px solid #1a1a1a;}

<script>
const LEVELS=["الكل","مبتدئ","متوسط","متقدم"];
const CATS=["الكل","شغل","مشاعر","شخصية","تواصل","تقنية","عام"];
const LCOL={مبتدئ:"#3ec87a",متوسط:"#f0a030",متقدم:"#e05555"};
const CICO={شغل:"💼",مشاعر:"❤️",شخصية:"🌟",تواصل:"🗣️",تقنية:"💻",عام:"🌐"};
const DAILY_GOAL=10;
const SB_URL="https://lqqhzjwqxwafsxkvlyli.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxcWh6andxeHdhZnN4a3ZseWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTk5MzQsImV4cCI6MjA5NjQ3NTkzNH0.pFWn7BIE2wQH0VfqhySqirNx6QoqRo2OB-RNXmnSQ8s";
const EL_KEY="sk_b8efa05e522f4638748a9d48e60cf771e80dd671594d6a78";
const YT_KEY="AIzaSyCP5k_uoUQZ58kOW2pfP9a1CEakgEyXfVE";
const EL_VOICE="EXAVITQu4vr4xnSDxMaL";
let st={words:[],saved:[],notes:{},curIdx:0,dark:true,fLevel:"الكل",fCat:"الكل",best:0,quizzes:0,streak:1,lastVisit:"",dailyCount:0,dailyDate:""};
let gen=false,curtab="home",fcIdx=0,fcFlip=false,fcDone=false;
let qqs=[],qcur=0,qsc=0,qsel=null,qdone=false;
let quizMode="choice";
let wqWord=null,wqDone=false,wqSc=0,wqTotal=0,wqList=[];
let libSel=null,tipOpen=false,gramOpen=false,noteEdit=false;
let currentUser=null,authToken=null,authMode="login";

function switchAuth(mode){authMode=mode;showEmailAuth();const tabs=document.querySelectorAll(".auth-tab");tabs.forEach(t=>t.classList.remove("on"));tabs.forEach(t=>{if((mode==="login"&&t.textContent.includes("دخول"))||(mode==="register"&&t.textContent.includes("إنشاء")))t.classList.add("on");});document.getElementById("authBtn").textContent=mode==="login"?"دخول":"إنشاء حساب";document.getElementById("authName").style.display=mode==="register"?"block":"none";document.getElementById("authMsg").textContent="";}
async function doAuth(){
  const email=document.getElementById("authEmail").value.trim();
  const pass=document.getElementById("authPass").value;
  const msg=document.getElementById("authMsg");
  if(!email||!pass){msg.className="auth-err";msg.textContent="أدخل الإيميل وكلمة المرور";return;}
  const btn=document.getElementById("authBtn");btn.textContent="⏳ جاري...";btn.disabled=true;
  try{
    const ep=authMode==="login"?"/auth/v1/token?grant_type=password":"/auth/v1/signup";
    const r=await fetch(SB_URL+ep,{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(d.error){msg.className="auth-err";msg.textContent=d.error_description||d.error;}
    else if(authMode==="register"&&!d.access_token){msg.className="auth-ok";msg.textContent="✅ تم الإنشاء! تحقق من إيميلك ثم سجّل دخول";switchAuth("login");}
    else{authToken=d.access_token;currentUser=d.user;localStorage.setItem("qulex_token",authToken);localStorage.setItem("qulex_user",JSON.stringify(currentUser));await loadUserSaves();showApp();}
  }catch(e){msg.className="auth-err";msg.textContent="خطأ في الاتصال";}
  btn.textContent=authMode==="login"?"دخول":"إنشاء حساب";btn.disabled=false;
}
function skipAuth(){currentUser=null;authToken=null;showApp();}
async function loadUserSaves(){if(!authToken)return;try{const r=await fetch(SB_URL+"/rest/v1/user_saves?select=*",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}});const data=await r.json();if(Array.isArray(data)){st.saved=data.map(row=>row.data).filter(Boolean);save();}}catch(e){}}
async function syncSaveToCloud(word,remove=false){
  if(!authToken||!currentUser)return;
  if(remove){await fetch(SB_URL+`/rest/v1/user_saves?user_id=eq.${currentUser.id}&word=eq.${encodeURIComponent(word)}`,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}});}
  else{const w=st.saved.find(s=>s.word===word);if(!w)return;await fetch(SB_URL+"/rest/v1/user_saves",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+authToken,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_id:currentUser.id,word,data:w})});}
}
async function doSignOut(){if(authToken){await fetch(SB_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}}).catch(()=>{});}localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");currentUser=null;authToken=null;document.getElementById("mainApp").style.display="none";document.getElementById("authScreen").style.display="flex";}
function showApp(){initParticles();document.getElementById("authScreen").style.display="none";document.getElementById("mainApp").style.display="block";initApp();}
function load(){try{const s=JSON.parse(localStorage.getItem("qulex_pwa")||"{}");st={...st,...s};const today=new Date().toDateString();const yest=new Date(Date.now()-86400000).toDateString();if(st.lastVisit===today){}else if(st.lastVisit===yest)st.streak=(st.streak||0)+1;else st.streak=1;st.lastVisit=today;if(st.dailyDate!==today){st.dailyCount=0;st.dailyDate=today;}}catch(e){}}
function save(){localStorage.setItem("qulex_pwa",JSON.stringify(st));}
function updHeader(){const el=document.getElementById("streakNum");if(el)el.textContent=st.streak;const av=document.getElementById("userAvatar");if(av){if(currentUser?.email){av.textContent=currentUser.email[0].toUpperCase();av.title=currentUser.email;}else av.textContent="👤";}}
async function nextWord(){tipOpen=false;gramOpen=false;noteEdit=false;gen=true;drawHome();const w=await fetchRandomWord();gen=false;if(w){const exists=st.words.findIndex(x=>x.word===w.word);if(exists===-1){st.words.push(w);st.curIdx=st.words.length-1;}else{st.curIdx=exists;}save();}drawHome();updCnt();}
function prevWord(){tipOpen=false;gramOpen=false;noteEdit=false;if(st.curIdx>0){st.curIdx--;save();drawHome();}}
async function genWord(){if(gen)return;gen=true;tipOpen=false;gramOpen=false;noteEdit=false;drawHome();const used=st.words.slice(-20).map(w=>w.word).join(",");const lvl=st.fLevel==="الكل"?["مبتدئ","متوسط","متقدم"][Math.floor(Math.random()*3)]:st.fLevel;const cat=st.fCat==="الكل"?"عام":st.fCat;const prompt=`علّم العرب إنجليزي. اختر كلمة ${lvl==="مبتدئ"?"سهلة":lvl==="متقدم"?"متقدمة":"متوسطة"} عن "${cat}". لا تكرر: ${used||"لا"}.\nJSON فقط:\n{"word":"","phonetic":"","type":"اسم/فعل/صفة","arabic":"","level":"${lvl}","cat":"${cat}","definition":"جملة","examples":[{"en":"","ar":""},{"en":"","ar":""},{"en":"","ar":""}],"tip":"","grammar":{"rule":"","explanation":"جملتان","correct":"","wrong":"","tip":""}}`;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=(d.content||[]).find(b=>b.type==="text")?.text||"";const w=JSON.parse(t.replace(/```json|```/g,"").trim());st.words.push(w);st.curIdx=st.words.length-1;save();}catch(e){document.getElementById("homeDiv").innerHTML+=`<p style="color:var(--red);text-align:center;font-size:12px;margin-top:8px;">تعذّر التوليد</p>`;}gen=false;drawHome();updCnt();}
async function spk(txt,rate=1){
  const btn=event?.currentTarget;
  if(btn&&btn.tagName==="BUTTON"){btn.textContent="⏳";btn.disabled=true;}
  try{
    const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+EL_VOICE,{
      method:"POST",
      headers:{"Content-Type":"application/json","xi-api-key":EL_KEY},
      body:JSON.stringify({text:txt,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.5,similarity_boost:0.75}})
    });
    if(!r.ok)throw new Error("EL failed");
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.playbackRate=rate;
    audio.play();
    audio.onended=()=>URL.revokeObjectURL(url);
  }catch(e){
    if(window.speechSynthesis){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(txt);
      u.lang="en-US";u.rate=rate;
      const vs=window.speechSynthesis.getVoices();
      const v=vs.find(v=>v.lang.startsWith("en")&&v.localService)||vs.find(v=>v.lang.startsWith("en"));
      if(v)u.voice=v;
      window.speechSynthesis.speak(u);
    }
  }
  if(btn&&btn.tagName==="BUTTON"){btn.textContent="🔊 استمع";btn.disabled=false;}
}
function esc(s){return(s||"").replace(/'/g,"\\'").replace(/"/g,'\\"');}

function wordHTML(w,opts={}){
  if(!w)return"";
  const saved=st.saved.some(s=>s.word===w.word);
  const note=st.notes[w.word]||"";
  const lc=LCOL[w.level]||"var(--acc)";
  const dailyPct=Math.min((st.dailyCount/DAILY_GOAL)*100,100);
  return`
  ${opts.back?`<button class="back" onclick="${opts.backFn}()">← رجوع</button>`:""}
  <div class="hero word-anim">
    ${opts.next?`<div class="daily-bar-wrap"><div class="daily-label"><span>كلمات اليوم</span><span>${st.dailyCount}/${DAILY_GOAL}</span></div><div class="daily-bar"><div class="daily-fill" style="width:${dailyPct}%"></div></div></div>`:""}
    <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;position:relative;z-index:1;">
      <span style="font-size:12px;color:${lc};font-weight:700;background:${lc}18;padding:3px 10px;border-radius:20px;">${w.level}</span>
      <span style="font-size:12px;color:var(--acc2);font-weight:700;background:rgba(196,122,191,.12);padding:3px 10px;border-radius:20px;">${CICO[w.cat]||""} ${w.cat}</span>
      ${w.type?`<span style="font-size:12px;color:var(--mut);font-weight:600;background:rgba(255,255,255,.06);padding:3px 10px;border-radius:20px;direction:ltr;">${w.type}</span>`:""}
    </div>
    <div class="word-big">${w.word}</div>
    <div class="word-ph">${w.phonetic}</div>
    <div class="word-ar">${w.arabic}</div>
    <div class="btns3" style="margin-top:12px;">
      <button class="abtn" style="background:rgba(139,58,158,.12);color:var(--acc2);border-color:rgba(139,58,158,.25)" onclick="spk('${esc(w.word)}',1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>استمع</button>
      ${opts.next?`<button class="abtn" style="background:rgba(255,255,255,.05);color:var(--mut);border-color:rgba(255,255,255,.08)" onclick="nextWord()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>جديدة</button>`:""}
    </div>

async function liveSearchWord(val){

      }).join('');

  },300);
}

if(savedToken&&savedUser){try{authToken=savedToken;currentUser=JSON.parse(savedUser);fetch(SB_URL+"/auth/v1/user",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authToken}}).then(r=>r.json()).then(async d=>{if(d.id){await loadUserSaves();showApp();}else{localStorage.removeItem("qulex_token");localStorage.removeItem("qulex_user");document.getElementById("authScreen").style.display="flex";initParticles();}}).catch(()=>{showApp();});}catch(e){document.getElementById("authScreen").style.display="flex";initParticles();}}else{document.getElementById("authScreen").style.display="flex";initParticles();}
</script>
</body>
</html>
